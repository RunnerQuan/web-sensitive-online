<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>网感测试.exe</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --paper: #f7f0cb;
      --paper-dark: #ede3b2;
      --ink: #171717;
      --red: #ff5c57;
      --blue: #58a6ff;
      --yellow: #ffd84d;
      --green: #7ae582;
      --pink: #ff8cc6;
      --bg: #d5e4ff;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 15% 20%, rgba(255, 92, 87, 0.18), transparent 22%),
        radial-gradient(circle at 85% 15%, rgba(88, 166, 255, 0.18), transparent 20%),
        linear-gradient(180deg, #cfe0ff 0%, #f5f7ff 100%);
    }

    body {
      touch-action: manipulation;
      font-family: "Comic Sans MS", "Trebuchet MS", "Marker Felt", cursive, sans-serif;
      color: var(--ink);
      display: flex;
      justify-content: center;
      padding: 8px;
    }

    .page-shell {
      width: min(100vw, 430px);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
    }

    .game-root {
      position: relative;
      width: 100%;
      min-height: calc(100vh - 16px);
      min-height: calc(100dvh - 16px);
      background:
        repeating-linear-gradient(
          180deg,
          rgba(80, 154, 255, 0.16) 0,
          rgba(80, 154, 255, 0.16) 2px,
          transparent 2px,
          transparent 34px
        ),
        linear-gradient(90deg, rgba(255, 120, 120, 0.22) 0, rgba(255, 120, 120, 0.22) 3px, transparent 3px, transparent 52px),
        linear-gradient(180deg, var(--paper) 0%, var(--paper-dark) 100%);
      border: 4px solid var(--ink);
      border-radius: 22px;
      box-shadow: 10px 10px 0 rgba(23, 23, 23, 0.18);
      overflow: hidden;
    }

    .doodle-layer,
    .scene-layer,
    .toast-layer {
      position: absolute;
      inset: 0;
    }

    .doodle-layer {
      pointer-events: none;
      overflow: hidden;
    }

    .scene-layer {
      z-index: 2;
      padding: calc(14px + var(--safe-top)) 12px calc(14px + var(--safe-bottom));
      overflow-y: auto;
      scrollbar-width: none;
    }

    .scene-layer::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    .toast-layer {
      z-index: 4;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: calc(16px + var(--safe-top));
      pointer-events: none;
    }

    .scribble,
    .scribble::before,
    .scribble::after {
      position: absolute;
      border: 3px solid var(--ink);
      border-radius: 999px;
      opacity: 0.14;
      content: "";
    }

    .scribble.one {
      width: 140px;
      height: 44px;
      top: 28px;
      right: -28px;
      transform: rotate(16deg);
    }

    .scribble.two {
      width: 108px;
      height: 34px;
      left: -24px;
      bottom: 120px;
      transform: rotate(-18deg);
    }

    .scribble.three {
      width: 70px;
      height: 24px;
      right: 28px;
      bottom: 260px;
      transform: rotate(-4deg);
    }

    .scribble::before {
      inset: 9px;
    }

    .scribble::after {
      inset: 18px;
    }

    .scene {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .sheet {
      background: rgba(255, 251, 235, 0.9);
      border: 4px solid var(--ink);
      border-radius: 20px;
      padding: 14px 12px;
      box-shadow: 6px 6px 0 rgba(23, 23, 23, 0.14);
      position: relative;
    }

    .sheet.tilt-left {
      transform: rotate(-1.2deg);
    }

    .sheet.tilt-right {
      transform: rotate(1deg);
    }

    .sheet::before {
      content: "";
      position: absolute;
      inset: 10px;
      border: 2px dashed rgba(23, 23, 23, 0.18);
      border-radius: 12px;
      pointer-events: none;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 6px 10px;
      border: 3px solid var(--ink);
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      background: #fff;
    }

    .tag.red {
      background: var(--red);
      color: #fff;
    }

    .tag.blue {
      background: var(--blue);
      color: #fff;
    }

    .tag.yellow {
      background: var(--yellow);
    }

    .tag.green {
      background: var(--green);
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr 108px;
      gap: 12px;
      align-items: center;
    }

    .title {
      margin: 0;
      font-size: clamp(28px, 7.6vw, 34px);
      line-height: 1.06;
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin: 8px 0 0;
      font-size: 14px;
      line-height: 1.5;
    }

    .small-note {
      margin: 0;
      font-size: 12px;
      line-height: 1.5;
    }

    .warning-box {
      display: grid;
      gap: 8px;
      margin-top: 4px;
    }

    .warning-line {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      font-size: 12px;
      line-height: 1.5;
    }

    .warning-line b {
      min-width: 18px;
    }

    .stickman-card {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 112px;
      background: #fff;
      border: 4px solid var(--ink);
      border-radius: 16px;
      transform: rotate(2deg);
      position: relative;
    }

    .stickman-card::after {
      content: "作者随手画的";
      position: absolute;
      right: 8px;
      bottom: 8px;
      font-size: 10px;
      background: var(--yellow);
      border: 2px solid var(--ink);
      padding: 2px 6px;
      border-radius: 999px;
      transform: rotate(-6deg);
    }

    .stickman-svg {
      width: 84px;
      height: 84px;
      overflow: visible;
    }

    .big-button,
    .mini-button,
    .option-button {
      appearance: none;
      border: 4px solid var(--ink);
      border-radius: 18px;
      color: var(--ink);
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.14s ease;
    }

    .big-button:active,
    .mini-button:active,
    .option-button:active {
      transform: translateY(2px) scale(0.98);
    }

    .big-button {
      min-height: 58px;
      width: 100%;
      padding: 12px 14px;
      font-size: clamp(18px, 5vw, 22px);
      box-shadow: 4px 4px 0 rgba(23, 23, 23, 0.16);
    }

    .mini-button {
      min-height: 46px;
      width: 100%;
      padding: 10px 14px;
      font-size: 15px;
      box-shadow: 4px 4px 0 rgba(23, 23, 23, 0.14);
    }

    .button-red {
      background: var(--red);
      color: #fff;
    }

    .button-blue {
      background: var(--blue);
      color: #fff;
    }

    .button-yellow {
      background: var(--yellow);
    }

    .button-green {
      background: var(--green);
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .status-box {
      border: 4px solid var(--ink);
      border-radius: 16px;
      padding: 8px 6px;
      text-align: center;
      background: #fff;
      min-height: 72px;
    }

    .status-box strong {
      display: block;
      font-size: 21px;
      margin-bottom: 4px;
    }

    .status-box span {
      display: block;
      font-size: 11px;
      line-height: 1.3;
    }

    .question-header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: start;
    }

    .timer-box {
      min-width: 86px;
      padding: 8px 6px;
      border: 4px solid var(--ink);
      border-radius: 16px;
      background: var(--yellow);
      text-align: center;
      transform: rotate(2deg);
    }

    .timer-number {
      display: block;
      font-size: 26px;
      line-height: 1;
    }

    .timer-label {
      display: block;
      font-size: 11px;
      margin-top: 4px;
    }

    .question-box h2 {
      margin: 0;
      font-size: clamp(20px, 5.8vw, 26px);
      line-height: 1.35;
    }

    .option-list {
      display: grid;
      gap: 10px;
    }

    .option-button {
      min-height: 64px;
      padding: 10px 12px;
      display: grid;
      grid-template-columns: 30px 1fr;
      gap: 8px;
      text-align: left;
      box-shadow: 4px 4px 0 rgba(23, 23, 23, 0.14);
      position: relative;
    }

    .option-button.selected::after {
      content: "已乱选";
      position: absolute;
      right: 10px;
      top: -12px;
      padding: 2px 8px;
      font-size: 11px;
      background: #fff;
      border: 3px solid var(--ink);
      border-radius: 999px;
      transform: rotate(-8deg);
    }

    .option-letter {
      width: 30px;
      height: 30px;
      border: 3px solid var(--ink);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.72);
      display: grid;
      place-items: center;
      font-size: 15px;
      font-weight: 700;
    }

    .option-copy {
      font-size: 15px;
      line-height: 1.4;
      align-self: center;
    }

    .stats-strip {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 12px;
      line-height: 1.4;
    }

    .rough-progress {
      height: 18px;
      border: 4px solid var(--ink);
      border-radius: 999px;
      overflow: hidden;
      background: #fff;
    }

    .rough-progress-fill {
      height: 100%;
      width: 100%;
      background:
        linear-gradient(90deg, var(--red) 0 25%, var(--yellow) 25% 50%, var(--green) 50% 75%, var(--blue) 75% 100%);
      transition: width 0.12s linear;
    }

    .result-card {
      display: grid;
      gap: 10px;
    }

    .result-head {
      text-align: center;
    }

    .result-head h2 {
      margin: 6px 0 0;
      font-size: clamp(24px, 7vw, 32px);
      line-height: 1.12;
    }

    .result-head p {
      margin: 8px 0 0;
      font-size: 13px;
      line-height: 1.5;
    }

    .fate-layout {
      display: grid;
      gap: 10px;
    }

    .fate-portrait {
      min-height: 132px;
      display: grid;
      place-items: center;
      border: 4px solid var(--ink);
      border-radius: 18px;
      background:
        radial-gradient(circle at center, rgba(255, 216, 77, 0.34), transparent 34%),
        #fff;
      position: relative;
      overflow: hidden;
    }

    .fate-portrait::before,
    .fate-portrait::after {
      content: "";
      position: absolute;
      border: 3px solid rgba(23, 23, 23, 0.14);
      border-radius: 50%;
    }

    .fate-portrait::before {
      width: 138px;
      height: 70px;
      transform: rotate(12deg);
    }

    .fate-portrait::after {
      width: 100px;
      height: 48px;
      transform: rotate(-8deg);
    }

    .fate-stamp {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 6px 14px;
      border: 3px solid var(--ink);
      border-radius: 999px;
      background: var(--pink);
      font-size: 12px;
      font-weight: 700;
      transform: rotate(-3deg);
    }

    .chart-box {
      border: 4px solid var(--ink);
      border-radius: 18px;
      background: #fff;
      padding: 10px;
    }

    .chart-box svg {
      display: block;
      width: 100%;
      height: 120px;
    }

    .record-box {
      border: 4px dashed var(--ink);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.72);
      padding: 10px;
      font-size: 13px;
      line-height: 1.5;
    }

    .button-stack {
      display: grid;
      gap: 10px;
      margin-top: 2px;
    }

    .toast {
      max-width: min(88vw, 340px);
      background: #fff;
      border: 4px solid var(--ink);
      border-radius: 18px;
      padding: 12px 14px;
      box-shadow: 6px 6px 0 rgba(23, 23, 23, 0.14);
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 10px;
      animation: toast-in 0.2s ease forwards;
    }

    .toast-icon {
      width: 34px;
      height: 34px;
      border: 3px solid var(--ink);
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--yellow);
      font-size: 18px;
    }

    .toast p {
      margin: 0;
      font-size: 14px;
      line-height: 1.45;
    }

    .footer-scratch {
      text-align: center;
      font-size: 11px;
      line-height: 1.45;
      opacity: 0.72;
      padding-bottom: 4px;
    }

    @keyframes toast-in {
      from {
        opacity: 0;
        transform: translateY(-12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 430px) {
      body {
        padding: 0;
      }

      .page-shell {
        width: 100vw;
        min-height: 100vh;
        min-height: 100dvh;
      }

      .game-root {
        min-height: 100vh;
        min-height: 100dvh;
        border-radius: 0;
        border-left: 0;
        border-right: 0;
        box-shadow: none;
      }

      .scene-layer {
        padding: calc(12px + var(--safe-top)) 10px calc(14px + var(--safe-bottom));
      }

      .sheet {
        border-width: 3px;
        border-radius: 16px;
        padding: 12px 10px;
        box-shadow: 4px 4px 0 rgba(23, 23, 23, 0.12);
      }

      .sheet::before {
        inset: 8px;
      }

      .hero {
        grid-template-columns: 1fr;
      }

      .stickman-card {
        min-height: 98px;
        max-width: 120px;
        justify-self: end;
      }

      .status-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .status-box {
        min-height: 66px;
      }

      .question-header {
        grid-template-columns: 1fr;
      }

      .timer-box {
        justify-self: start;
        transform: rotate(0.8deg);
      }

      .option-button {
        min-height: 60px;
      }

      .button-stack {
        gap: 8px;
      }
    }

    @media (max-width: 360px) {
      .tag {
        min-height: 30px;
        padding: 5px 8px;
        font-size: 10px;
      }

      .subtitle,
      .record-box,
      .toast p {
        font-size: 12px;
      }

      .warning-line,
      .stats-strip {
        font-size: 11px;
      }

      .big-button {
        min-height: 54px;
        font-size: 17px;
      }

      .mini-button {
        min-height: 42px;
        font-size: 14px;
      }

      .option-copy {
        font-size: 14px;
      }

      .fate-portrait {
        min-height: 118px;
      }

      .chart-box svg {
        height: 108px;
      }
    }
  </style>
</head>
<body>
  <main class="page-shell">
    <section class="game-root">
      <div class="doodle-layer">
        <div class="scribble one"></div>
        <div class="scribble two"></div>
        <div class="scribble three"></div>
      </div>
      <section id="scene-layer" class="scene-layer"></section>
      <section id="toast-layer" class="toast-layer"></section>
    </section>
  </main>

      });
      gameState.timers = [];
      gameState.isLocked = false;
    }

    function registerTimer(timerId) {
      gameState.timers.push(timerId);
      return timerId;
    }

    function renderQuizScene() {
      const sceneLayer = document.getElementById('scene-layer');

      if (!quiz) {

    function startCountdown() {
      gameState.deadline = Date.now() + GAME_CONFIG.questionDuration * 1000;
      gameState.countdownValue = GAME_CONFIG.questionDuration;

      registerTimer(setInterval(() => {
        const msLeft = Math.max(0, gameState.deadline - Date.now());
        const secondsLeft = Math.ceil(msLeft / 1000);
        const ratio = Math.max(0, msLeft / (GAME_CONFIG.questionDuration * 1000));

        const timerNumber = document.getElementById('timer-number');
        const timerFill = document.getElementById('timer-fill');

        if (timerNumber) {
          timerNumber.textContent = String(secondsLeft);
          timerNumber.style.color = secondsLeft <= 5 ? '#b8001f' : '';
        }

        if (timerFill) {
          timerFill.style.width = `${ratio * 100}%`;
        }

        if (msLeft <= 0) {
          resolveTimeout();
        }
      }, 100));
    }

    function resolveAnswer(optionIndex) {
      if (gameState.isLocked) return;
      gameState.isLocked = true;
      clearRuntime();

      const quiz = gameState.quizQueue[gameState.quizIndex];
      const option = quiz.options[optionIndex];
      const isBest = optionIndex === quiz.answerIndex;

      Object.entries(option.scores).forEach(([key, amount]) => {
        gameState.scores[key] += amount;
      });

      showToast(isBest ? quiz.correctFeedback : quiz.wrongFeedback, isBest ? '✔' : '？');

      registerTimer(setTimeout(() => {
        nextQuestion();
      }, 780));
    }

    function resolveTimeout() {
      if (gameState.isLocked) return;
      gameState.isLocked = true;
      clearRuntime();
      gameState.scores.expressionValue += 8;
      showToast('你超时了。系统判断你突然看着题目发呆。', '⌛');

      registerTimer(setTimeout(() => {
        nextQuestion();
      }, 780));
    }

    function nextQuestion() {
      gameState.quizIndex += 1;
      gameState.isLocked = false;
      renderQuizScene();
    }

    function buildResult() {
      const traitScores = buildNormalizedTraitScores();
      const fate = determineFate(traitScores);
      const finalScore = Math.max(
        0,
        Math.round(
          traitScores.memeSense * 0.42 +
          traitScores.abstractValue * 0.33 +
          traitScores.expressionValue * 0.25
        )
      );

      gameState.result = {
        fate,
        finalScore,
        traitScores,
        mockTitle: pickMockTitle(finalScore),
        strongest: getStrongestTrait(traitScores),
        weakest: getWeakestTrait(traitScores)
      };

      saveBestScore();
    }

    function buildNormalizedTraitScores() {
      const traitKeys = ['memeSense', 'abstractValue', 'expressionValue'];
      const maxScores = {
        memeSense: 0,
        abstractValue: 0,
        expressionValue: 0
      };

      gameState.quizQueue.forEach((quiz) => {
        traitKeys.forEach((key) => {
          const questionMax = Math.max(
            ...quiz.options.map((option) => Number(option.scores[key] || 0))
          );
          maxScores[key] += questionMax;
        });
      });

      return traitKeys.reduce((acc, key) => {
        const rawScore = Number(gameState.scores[key] || 0);
        const maxScore = Number(maxScores[key] || 0);
        acc[key] = maxScore > 0 ? Math.round((rawScore / maxScore) * 100) : 0;
        return acc;
      }, {});
    }

    function determineFate(traitScores) {
      const sorted = [
        { key: 'memeSense', value: traitScores.memeSense },
        { key: 'abstractValue', value: traitScores.abstractValue },
        { key: 'expressionValue', value: traitScores.expressionValue }
      ].sort((a, b) => b.value - a.value);

      const isBalanced = Math.abs(sorted[0].value - sorted[2].value) <= 8 && sorted[0].value >= 18;
      if (isBalanced) return findFate('balancedSpirit');

      const dominant = sorted[0].key;
      const secondary = sorted[1].key;

      if (dominant === 'abstractValue' && secondary === 'memeSense') return findFate('abstractSaint');
      if (dominant === 'memeSense' && secondary === 'abstractValue') return findFate('memeOracle');
      if (dominant === 'expressionValue' && secondary === 'memeSense') return findFate('awkwardSeer');
      if (
        (dominant === 'abstractValue' && secondary === 'expressionValue') ||
        (dominant === 'expressionValue' && secondary === 'abstractValue')
      ) {
        return findFate('chaosAlchemist');
      }
      if (dominant === 'expressionValue') return findFate('mortalAnchor');
      return findFate('memeOracle');
    }

    function renderTriangleChart() {
      const meme = clamp(gameState.result.traitScores.memeSense, 0, 100);
      const abs = clamp(gameState.result.traitScores.abstractValue, 0, 100);
      const awkward = clamp(gameState.result.traitScores.expressionValue, 0, 100);
      const cx = 150;
      const cy = 74;
      const r = 58;

      const points = [
        pointAt(cx, cy, r * (meme / 100), -90),
        pointAt(cx, cy, r * (abs / 100), 150),
        pointAt(cx, cy, r * (awkward / 100), 30)
      ];

      return `
        <svg viewBox="0 0 300 150" aria-label="三角属性图">
          <polygon points="150,18 84,124 216,124" fill="none" stroke="#171717" stroke-width="3"></polygon>
          <polygon points="150,36 101,110 199,110" fill="none" stroke="rgba(23,23,23,0.18)" stroke-width="2"></polygon>
          <line x1="150" y1="18" x2="150" y2="124" stroke="rgba(23,23,23,0.18)" stroke-width="2"></line>
          <line x1="84" y1="124" x2="216" y2="124" stroke="rgba(23,23,23,0.18)" stroke-width="2"></line>
          <line x1="150" y1="18" x2="84" y2="124" stroke="rgba(23,23,23,0.18)" stroke-width="2"></line>
          <line x1="150" y1="18" x2="216" y2="124" stroke="rgba(23,23,23,0.18)" stroke-width="2"></line>
          <polygon points="${points.map((p) => `${p.x},${p.y}`).join(' ')}" fill="rgba(255,92,87,0.45)" stroke="#171717" stroke-width="3"></polygon>
          ${points.map((p) => `<circle cx="${p.x}" cy="${p.y}" r="4" fill="#171717"></circle>`).join('')}
          <text x="150" y="12" text-anchor="middle" font-size="13" fill="#171717">网感值</text>
          <text x="70" y="138" text-anchor="middle" font-size="13" fill="#171717">抽象值</text>
          <text x="230" y="138" text-anchor="middle" font-size="13" fill="#171717">尴尬值</text>
        </svg>
      `;
    }

    function renderStickmanSvg(mode) {
      if (mode === 'result') {
        return `
          <svg class="stickman-svg" viewBox="0 0 100 100" aria-hidden="true">
            <circle cx="50" cy="18" r="10" fill="none" stroke="#171717" stroke-width="4"></circle>
            <line x1="50" y1="28" x2="50" y2="58" stroke="#171717" stroke-width="4" stroke-linecap="round"></line>
            <line x1="50" y1="36" x2="30" y2="46" stroke="#171717" stroke-width="4" stroke-linecap="round"></line>
            <line x1="50" y1="36" x2="70" y2="28" stroke="#171717" stroke-width="4" stroke-linecap="round"></line>
            <line x1="50" y1="58" x2="34" y2="84" stroke="#171717" stroke-width="4" stroke-linecap="round"></line>
            <line x1="50" y1="58" x2="68" y2="84" stroke="#171717" stroke-width="4" stroke-linecap="round"></line>
            <path d="M68 24 C74 20, 80 22, 82 28" fill="none" stroke="#ff5c57" stroke-width="4" stroke-linecap="round"></path>
            <path d="M21 64 C28 58, 32 58, 38 64" fill="none" stroke="#58a6ff" stroke-width="4" stroke-linecap="round"></path>
          </svg>
        `;
      }

      return `
        <svg class="stickman-svg" viewBox="0 0 100 100" aria-hidden="true">
          <circle cx="48" cy="18" r="10" fill="none" stroke="#171717" stroke-width="4"></circle>
          <line x1="48" y1="28" x2="48" y2="58" stroke="#171717" stroke-width="4" stroke-linecap="round"></line>
          <line x1="48" y1="38" x2="24" y2="28" stroke="#171717" stroke-width="4" stroke-linecap="round"></line>
          <line x1="48" y1="38" x2="74" y2="42" stroke="#171717" stroke-width="4" stroke-linecap="round"></line>
          <line x1="48" y1="58" x2="30" y2="84" stroke="#171717" stroke-width="4" stroke-linecap="round"></line>
          <line x1="48" y1="58" x2="62" y2="84" stroke="#171717" stroke-width="4" stroke-linecap="round"></line>
          <rect x="64" y="22" width="24" height="20" rx="4" fill="#ffd84d" stroke="#171717" stroke-width="3"></rect>
          <text x="76" y="36" text-anchor="middle" font-size="8" font-family="Comic Sans MS, cursive" fill="#171717">开测</text>
        </svg>
      `;
    }

    function getStrongestTrait(traitScores) {
      return [
        { label: '网感值', value: traitScores.memeSense },
        { label: '抽象值', value: traitScores.abstractValue },
        { label: '尴尬值', value: traitScores.expressionValue }
      ].sort((a, b) => b.value - a.value)[0];
    }

    function getWeakestTrait(traitScores) {
      return [
        { label: '网感值', value: traitScores.memeSense },
        { label: '抽象值', value: traitScores.abstractValue },
        { label: '尴尬值', value: traitScores.expressionValue }
      ].sort((a, b) => a.value - b.value)[0];
    }

    function pickMockTitle(finalScore) {
      if (finalScore >= 85) return '高级网民合格证';
      if (finalScore >= 55) return '轻度抽象通过单';
      return '破防观察对象';
    }

    function findFate(id) {
      return FATE_POOL.find((item) => item.id === id);
    }

    function optionColorClass(index) {
      return [
        'button-yellow',
        'button-blue',
        'button-green',
        'button-red'
      ][index % 4];
    }

    function shuffleArray(list) {
      const copy = list.slice();
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function pointAt(cx, cy, radius, angleDeg) {
      const rad = (angleDeg - 90) * (Math.PI / 180);
      return {
        x: cx + radius * Math.cos(rad),
        y: cy + radius * Math.sin(rad)
      };
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function cssColor(name) {
      return {
        red: '#ff5c57',
        blue: '#58a6ff',
        yellow: '#ffd84d',
        green: '#7ae582'
      }[name];
    }

    function saveBestScore() {
      const score = gameState.result.finalScore;
      const title = gameState.result.fate.name;
      const memeSense = gameState.result.traitScores.memeSense;

      if (score >= gameState.best.score) {
        gameState.best.score = score;
        gameState.best.title = title;
        gameState.best.memeSense = memeSense;
      }

      try {
        localStorage.setItem(STORAGE_KEYS.bestScore, String(gameState.best.score));
        localStorage.setItem(STORAGE_KEYS.bestTitle, gameState.best.title);
        localStorage.setItem(STORAGE_KEYS.bestMemeSense, String(gameState.best.memeSense));
      } catch (error) {
        console.warn('保存失败：', error);
      }
    }

    function loadBestScore() {
      try {
        gameState.best.score = Number(localStorage.getItem(STORAGE_KEYS.bestScore) || 0);
        gameState.best.title = localStorage.getItem(STORAGE_KEYS.bestTitle) || '暂无';
        gameState.best.memeSense = Number(localStorage.getItem(STORAGE_KEYS.bestMemeSense) || 0);
      } catch (error) {
        console.warn('读取失败：', error);
      }
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    window.addEventListener('error', (event) => {
      showToast(`页面抽风了：${event.message || '未知问题'}`, '💥');
    });

    window.addEventListener('unhandledrejection', () => {
      showToast('有个异步流程半路掉沟里了。', '💥');
    });

    document.addEventListener('DOMContentLoaded', initGame);
  </script>
</body>
</html>

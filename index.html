        if (state.phase === "playing") {
          clearTimer();
          context.setStatus("paused");
        }
      }

      function resume() {
        if (state.phase === "playing") {
          runTimer();
          context.setStatus("playing");
        }
      }

      function reset() {
        clearTimer();
        state = getInitialState();
        renderIntro();
        context.setStatus("not-started");
      }

      function destroy() {
        clearTimer();
      }

      function getState() {
        return state;
      }

      function renderIntro() {
        clearTimer();
        container.innerHTML = `
          <div class="game-screen screw-screen game-screen-scroll">
            <div class="tag-list">
              <span class="tag" style="background:rgba(255,255,255,.72);">🐾 LEVEL 02 🐾</span>
            </div>
            <div class="game-panel screw-hero">
              <p class="game-copy">越想拧明白，越容易拧巴。</p>
              <h2 class="game-heading" style="color:#20343d;">果冻风猫爪拧螺丝</h2>
              <p class="game-copy" style="margin-top:10px;">按层拆果冻钉，别硬点被压住的那颗。24 秒内拆得越干净，抗拧巴指数越高。</p>
              <div class="modal-actions" style="margin-top:16px;">
                <button class="game-button primary" id="twistStartButton" style="background:linear-gradient(90deg,#61a9ff 0%, #22d3ae 100%);color:#fff;">▶ 拆解开始</button>
              </div>
            </div>
          </div>
        `;
        container.querySelector("#twistStartButton").addEventListener("click", beginGame);
      }

      function beginGame() {
        state = getInitialState();
        state.phase = "playing";
        context.setStatus("playing");
        renderBoard();
        runTimer();
      }

      function renderBoard() {
        const removedSet = new Set(state.removed);
        const removedPlateSet = new Set(state.removedPlates);
        container.innerHTML = `
          <div class="game-screen screw-screen game-screen-scroll">
            <div class="screw-status">
              <div class="screw-status-card">剩余时间<br><strong>${state.timeLeft}s</strong></div>
              <div class="screw-status-card">已拆果冻钉<br><strong>${state.removed.length}/6</strong></div>
              <div class="screw-status-card">拧巴值<br><strong>${state.awkward}/100</strong></div>
            </div>
            <div class="game-panel screw-hero">
              <p class="game-copy">当前提示：${escapeHtml(getHintText())}</p>
            </div>
            <div class="screw-board">
              <div class="plate pink ${removedPlateSet.has("pink") ? "is-removed" : ""}"></div>
              <div class="plate green ${removedPlateSet.has("green") ? "is-removed" : ""}"></div>
              <div class="plate blue ${removedPlateSet.has("blue") ? "is-removed" : ""}"></div>
              ${screwConfig.map((screw) => {
                const accessible = isScrewAccessible(screw);
                const classes = [
                  "screw-btn",
                  screw.color,
                  removedSet.has(screw.id) ? "removed" : "",
                  !removedSet.has(screw.id) && !accessible ? "blocked" : ""
                ].join(" ");
                return `<button class="${classes}" data-screw-id="${screw.id}" style="left:${screw.x}px;top:${screw.y}px;"></button>`;
              }).join("")}
            </div>
          </div>
        `;
        Array.from(container.querySelectorAll("[data-screw-id]")).forEach((button) => {
          button.addEventListener("click", () => handleScrewClick(button.dataset.screwId));
        });
      }

      function handleScrewClick(id) {
        const screw = screwConfig.find((item) => item.id === id);
        if (!screw || state.removed.includes(id)) return;
        if (!isScrewAccessible(screw)) {
          state.awkward = Math.min(100, state.awkward + 16);
          context.showToast("别硬拧");
          if (state.awkward >= 100) {
            finishGame("awkward");
          } else {
            renderBoard();
          }
          return;
        }
        state.removed.push(id);
        updateRemovedPlates();
        if (state.removed.length >= screwConfig.length) {
          finishGame("clear");
          return;
        }
        renderBoard();
      }

      function isScrewAccessible(screw) {
        return screw.prereq.every((plate) => state.removedPlates.includes(plate));
      }

      function updateRemovedPlates() {
        const grouped = {
          pink: ["s1", "s2"],
          green: ["s3", "s4"],
          blue: ["s5", "s6"]
        };
        Object.keys(grouped).forEach((plateId) => {
          if (!state.removedPlates.includes(plateId) && grouped[plateId].every((id) => state.removed.includes(id))) {
            state.removedPlates.push(plateId);
          }
        });
      }

      function getHintText() {
        if (!state.removedPlates.includes("pink")) return "先拆外层猫爪板上的粉色钉。";
        if (!state.removedPlates.includes("green")) return "粉层松了，继续拆中层绿色钉。";
        return "最后两颗底层钉已经露出来了，别犹豫。";
      }

      function finishGame(reason) {
        clearTimer();
        state.phase = "result";
        const success = reason === "clear";
        const score = Math.max(16, state.removed.length * 15 + state.timeLeft * 2 - Math.round(state.awkward * 0.6));
        let title = "慢热型拧巴人";
        let summary = "你没有全懂，但你懂得在彻底绕进去之前先滑走。";
        if (success && state.awkward <= 30) {
          title = "螺丝厂传说";
          summary = "你拆得干净，松得及时，果冻螺丝没能把你困住。";
        } else if (reason === "awkward") {
          title = "无力维持人形";
          summary = "你不是拆钉子，是在跟自己较劲。下次记得先松手。";
        }
        const tags = ["已拆 " + state.removed.length + "/6", "拧巴值 " + state.awkward, success ? "拆完了" : "还能再刷"];
        context.finishGame({ score, title, summary, tags });
        container.innerHTML = `
          <div class="game-screen screw-screen game-screen-scroll">
            <div class="game-panel screw-hero" style="text-align:center;">
              <p class="game-copy">抗拧巴指数</p>
              <h2 class="game-heading" style="color:#20343d;">${score}</h2>
              <p class="game-copy">${escapeHtml(summary)}</p>
            </div>
            <div class="game-panel screw-hero" style="text-align:center;">
              <h3 style="margin:0 0 8px;font-size:28px;">${escapeHtml(title)}</h3>
              <div class="tag-list" style="justify-content:center;">
                ${tags.map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join("")}
              </div>
              <div class="modal-actions" style="margin-top:18px;justify-content:center;">
                <button class="game-button primary" id="twistReplayButton" style="background:linear-gradient(90deg,#ff8cab,#ff6d8d);color:#fff;">再拆一次</button>
              </div>
              <div class="hint-up" style="justify-content:center;color:#314851;">↑ 继续上滑 · 别在这里继续拧</div>
            </div>
          </div>
        `;
        container.querySelector("#twistReplayButton").addEventListener("click", reset);
      }

      function runTimer() {
        clearTimer();
        timer = window.setInterval(() => {
          state.timeLeft -= 1;
          if (state.timeLeft <= 0) {
            state.timeLeft = 0;
            finishGame("timeout");
            return;
          }
          renderBoard();
        }, 1000);
      }

      function clearTimer() {
        if (timer) {
          window.clearInterval(timer);
          timer = null;
        }
      }

      return { mount, start, pause, resume, reset, destroy, getState };
    }

      function getInitialState() {
        return {

          basketX: 180,
          targetX: 180,

          spawnAccumulator: 0,
          dragging: false
        };
      }

      function mount() {
        container.className = "game-shell-inner bean-root";
        state = getInitialState();
        bgm = new Audio(bgmSrc);
        bgm.loop = true;
        bgm.preload = "auto";
        bgm.playsInline = true;
        container.innerHTML = `
          <div class="bean-stage">
            <canvas class="bean-canvas"></canvas>

            <div class="bean-overlay"></div>
            <div class="game-control-zone"></div>
          </div>
        `;
        refs = {
          canvas: container.querySelector(".bean-canvas"),
          ctx: container.querySelector(".bean-canvas").getContext("2d"),
          cat: container.querySelector(".bean-cat"),
          overlay: container.querySelector(".bean-overlay"),
          control: container.querySelector(".game-control-zone")
        };
        bindControls();
        resizeCanvas();
        resizeHandler = () => resizeCanvas();
        window.addEventListener("resize", resizeHandler);
        renderIntro();
        drawFrame();
      }

      function start() {
        context.setStatus("not-started");
        resetBgm();
        renderIntro();
        drawFrame();
      }

      function pause() {
        if (state.phase === "playing") {
          stopLoop();
          stopBgm();
          context.setStatus("paused");
        }
      }

      function resume() {
        if (state.phase === "playing") {
          state.lastFrame = performance.now();
          context.setStatus("playing");
          playBgm();
          startLoop();
        }
      }

      function reset() {
        stopLoop();
        state = getInitialState();
        resetBgm();
        renderIntro();
        drawFrame();
        context.setStatus("not-started");
      }

      function destroy() {
        stopLoop();
        if (resizeHandler) {
          window.removeEventListener("resize", resizeHandler);
        }
        stopBgm();
      }

      function getState() {
        return state;
      }

      function bindControls() {
        const control = refs.control;
        const updatePointer = (clientX) => {
          const rect = refs.canvas.getBoundingClientRect();
          const x = ((clientX - rect.left) / rect.width) * refs.canvas.width;
          state.targetX = clamp(x, 42, refs.canvas.width - 42);
        };

        control.addEventListener("pointerdown", (event) => {
          if (state.phase !== "playing") return;
          state.dragging = true;
          control.setPointerCapture(event.pointerId);
          updatePointer(event.clientX);
        });

        control.addEventListener("pointermove", (event) => {
          if (!state.dragging || state.phase !== "playing") return;
          updatePointer(event.clientX);
        });

        const release = () => {
          state.dragging = false;
        };

        control.addEventListener("pointerup", release);
        control.addEventListener("pointercancel", release);
      }

      function resizeCanvas() {
        const rect = refs.canvas.getBoundingClientRect();
        refs.canvas.width = Math.max(320, Math.floor(rect.width));
        refs.canvas.height = Math.max(520, Math.floor(rect.height));
        state.basketX = clamp(state.basketX, 42, refs.canvas.width - 42);
        state.targetX = clamp(state.targetX, 42, refs.canvas.width - 42);
        drawFrame();
      }

      function renderIntro() {
        refs.overlay.innerHTML = `
          <div class="bean-start">
            <div class="bean-card">
              <p class="game-copy" style="color:#ff9900;font-weight:900;">⚡ 能量补给站</p>
              <h3 style="color:#ff8800;">哈基米南北绿豆</h3>
              <p class="game-copy" style="color:#8b96a1;">左右拖动小猫，接住绿豆避开红豆</p>
              <div class="modal-actions" style="margin-top:18px;justify-content:center;">
                <button class="game-button primary" id="beanStartButton" style="background:#47bd26;color:#fff;box-shadow:inset 0 -6px 0 rgba(29,118,18,.4);">⬇ 开始游戏</button>
              </div>
              <div class="screen-tip" style="color:#51695a;">控制区只认横向拖动，想切下一刷请从别处上滑。</div>
            </div>
          </div>
        `;
        refs.overlay.querySelector("#beanStartButton").addEventListener("click", beginRound);
      }

      function renderHud() {
        refs.overlay.innerHTML = `
          <div class="bean-hud">
            <div class="bean-badges">
              <div class="bean-badge">🪙 分数 ${state.score}</div>
              <div class="bean-badge">🟢 ${state.greenCaught} / 🔴 ${state.redCaught}</div>
            </div>
            <div class="bean-badge">⏱ ${Math.ceil(state.timeLeft)}s</div>
          </div>
        `;
      }

      function beginRound() {
        state = getInitialState();
        state.phase = "playing";
        state.lastFrame = performance.now();
        refs.overlay.innerHTML = "";
        context.setStatus("playing");
        playBgm();
        renderHud();
        startLoop();
      }

      function startLoop() {
        stopLoop();
        const tick = (timestamp) => {
          const dt = Math.min(32, timestamp - state.lastFrame);
          state.lastFrame = timestamp;
          updateRound(dt);
          drawFrame();
          if (state.phase === "playing") {
            rafId = window.requestAnimationFrame(tick);
          }
        };
        rafId = window.requestAnimationFrame(tick);
      }

      function stopLoop() {
        if (rafId) {
          window.cancelAnimationFrame(rafId);
          rafId = null;
        }
      }

      function updateRound(dt) {
        state.elapsedMs += dt;
        state.timeLeft = Math.max(0, 30 - state.elapsedMs / 1000);
        state.spawnAccumulator += dt;
        state.basketX += (state.targetX - state.basketX) * 0.22;

        const phaseIndex = state.elapsedMs < 10000 ? 0 : state.elapsedMs < 20000 ? 1 : 2;
        const spawnInterval = [680, 520, 420][phaseIndex];
        const redProbability = [0.2, 0.26, 0.34][phaseIndex];

        while (state.spawnAccumulator >= spawnInterval) {
          state.spawnAccumulator -= spawnInterval;
          state.beans.push({
            x: 28 + Math.random() * (refs.canvas.width - 56),
            y: -20,
            speed: 2.4 + phaseIndex * 0.85 + Math.random() * 1.35,
            radius: 11 + Math.random() * 2,
            red: Math.random() < redProbability
          });
        }

        const basketRect = {
          x: state.basketX - 42,
          y: refs.canvas.height * 0.79 - 22,
          width: 84,
          height: 44
        };

        for (let index = state.beans.length - 1; index >= 0; index -= 1) {
          const bean = state.beans[index];
          bean.y += bean.speed * (dt / 16);
          if (bean.y > refs.canvas.height + 30) {
            state.beans.splice(index, 1);
            continue;
          }
          if (bean.x > basketRect.x && bean.x < basketRect.x + basketRect.width && bean.y + bean.radius > basketRect.y && bean.y - bean.radius < basketRect.y + basketRect.height) {
            if (bean.red) {
              state.score = Math.max(0, state.score - 8);
              state.redCaught += 1;
              context.showToast("红豆退散");
            } else {
              state.score += 10;
              state.greenCaught += 1;
            }
            state.beans.splice(index, 1);
          }
        }

        renderHud();
        if (state.timeLeft <= 0) {
          finishRound();
        }
      }

      function finishRound() {
        stopLoop();
        stopBgm();
        state.phase = "result";
        const score = state.score;
        let title = "绿豆型刷游圣体";
        let summary = "绿豆入筐，红豆退散，你是天选接豆猫。";
        if (score < 90) {
          title = "稳中带晃接豆猫";
          summary = "你没全接住，但你已经理解了这场补给的精髓。";
        }
        if (score < 40) {
          title = "被红豆教育了";
          summary = "这局主要收获不是豆，是教训。";
        }
        const tags = ["绿豆 " + state.greenCaught, "红豆 " + state.redCaught, "补给分 " + score];
        context.finishGame({ score, title, summary, tags });
        refs.overlay.innerHTML = `
          <div class="bean-result">
            <div class="bean-card">
              <p class="game-copy" style="color:#46604d;">补给结算</p>
              <h3 style="color:#ff8800;">${escapeHtml(title)}</h3>
              <p class="game-copy" style="color:#314a39;">${escapeHtml(summary)}</p>
              <div class="result-metrics" style="justify-content:center;margin-top:16px;">
                ${tags.map((tag) => `<span class="metric-pill">${escapeHtml(tag)}</span>`).join("")}
              </div>
              <div class="modal-actions" style="margin-top:18px;justify-content:center;">
                <button class="game-button primary" id="beanReplayButton" style="background:#47bd26;color:#fff;box-shadow:inset 0 -6px 0 rgba(29,118,18,.4);">再接一轮</button>
              </div>
              <div class="screen-tip" style="color:#51695a;">↑ 继续上滑 · 这只猫已经可以休息了</div>
            </div>
          </div>
        `;
        refs.overlay.querySelector("#beanReplayButton").addEventListener("click", reset);
      }

      function playBgm() {
        if (!bgm) return;
        bgm.currentTime = 0;
        const promise = bgm.play();
        if (promise && typeof promise.catch === "function") {
          promise.catch(() => {});
        }
      }

      function stopBgm() {
        if (!bgm) return;
        bgm.pause();
        bgm.currentTime = 0;
      }

      function resetBgm() {
        stopBgm();
      }

      function drawFrame() {
        if (!refs) return;
        const ctx = refs.ctx;
        const width = refs.canvas.width;
        const height = refs.canvas.height;

        ctx.clearRect(0, 0, width, height);

        const bg = ctx.createLinearGradient(0, 0, 0, height);
        bg.addColorStop(0, "#8ce4ad");
        bg.addColorStop(0.45, "#2f874b");
        bg.addColorStop(1, "#0d2413");
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, width, height);

        ctx.fillStyle = "rgba(255,255,255,0.08)";
        for (let i = 0; i < 6; i += 1) {
          ctx.beginPath();
          ctx.arc((i + 1) * (width / 7), height * 0.14 + Math.sin((state.elapsedMs / 900) + i) * 10, 24 + (i % 2) * 8, 0, Math.PI * 2);
          ctx.fill();
        }

        state.beans.forEach((bean) => {
          ctx.beginPath();
          ctx.fillStyle = bean.red ? "#f05a72" : "#a7ff55";
          ctx.shadowColor = bean.red ? "rgba(240,90,114,0.38)" : "rgba(167,255,85,0.42)";
          ctx.shadowBlur = 16;
          ctx.ellipse(bean.x, bean.y, bean.radius * 1.1, bean.radius, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;
        });

        const basketY = height * 0.79;
        ctx.fillStyle = "#5f3c1b";
        roundRect(ctx, state.basketX - 44, basketY - 14, 88, 34, 14);
        ctx.fill();
        ctx.fillStyle = "#bb8a51";
        roundRect(ctx, state.basketX - 48, basketY - 24, 96, 16, 12);
        ctx.fill();

        updateCatSprite(width, height);
      }

      function updateCatSprite(width, height) {
        if (!refs.cat) return;
        refs.cat.style.display = "block";
        refs.cat.style.left = (state.basketX - 45) + "px";
        refs.cat.style.top = (height * 0.68 - 18) + "px";
      }

      function roundRect(ctx, x, y, width, height, radius) {
        const r = Math.min(radius, width / 2, height / 2);
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + width, y, x + width, y + height, r);
        ctx.arcTo(x + width, y + height, x, y + height, r);
        ctx.arcTo(x, y + height, x, y, r);
        ctx.arcTo(x, y, x + width, y, r);
        ctx.closePath();
      }

      return { mount, start, pause, resume, reset, destroy, getState };
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }
  </script>
</body>
</html>

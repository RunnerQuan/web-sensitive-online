<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>哈基抖</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <style>
    :root {
      --bg: #06070d;
      --panel: rgba(10, 12, 24, 0.76);
      --panel-strong: rgba(15, 19, 36, 0.9);
      --line: rgba(255, 255, 255, 0.14);
      --line-strong: rgba(255, 255, 255, 0.28);
      --text: #f7f8ff;
      --muted: rgba(233, 238, 255, 0.72);
      --accent-cyan: #64f5ff;
      --accent-pink: #ff4f8a;
      --accent-lime: #97ff7c;
      --accent-gold: #ffd86b;
      --shadow: 0 18px 44px rgba(0, 0, 0, 0.34);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      max-width: 100vw;
      height: 100%;
      overflow: hidden;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 15% 12%, rgba(100, 245, 255, 0.24), transparent 24%),
        radial-gradient(circle at 82% 16%, rgba(255, 79, 138, 0.2), transparent 20%),
        radial-gradient(circle at 50% 110%, rgba(151, 255, 124, 0.12), transparent 24%),
        linear-gradient(180deg, #0b0d16 0%, #05060a 100%);
      color: var(--text);
      font-family: "Trebuchet MS", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    body {
      touch-action: manipulation;
      -webkit-font-smoothing: antialiased;
    }

    button {
      font: inherit;
      color: inherit;
    }

    .hakidou-app {
      position: relative;
      width: 100%;
      max-width: 100%;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 20% 10%, rgba(100, 245, 255, 0.18), transparent 28%),
        radial-gradient(circle at 80% 20%, rgba(255, 79, 138, 0.18), transparent 24%),
        linear-gradient(180deg, rgba(9, 11, 22, 0.94) 0%, rgba(3, 4, 8, 0.98) 100%);
    }

    .hakidou-app::before,
    .hakidou-app::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      pointer-events: none;
      filter: blur(0.5px);
      opacity: 0.5;
    }

    .hakidou-app::before {
      width: 40vw;
      height: 40vw;
      left: -12vw;
      top: 28vh;
      background: radial-gradient(circle, rgba(255, 79, 138, 0.28), transparent 72%);
    }

    .hakidou-app::after {
      width: 32vw;
      height: 32vw;
      right: -8vw;
      bottom: 18vh;
      background: radial-gradient(circle, rgba(100, 245, 255, 0.24), transparent 72%);
    }

    .app-topbar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
      height: calc(58px + var(--safe-top));
      padding: calc(10px + var(--safe-top)) calc(16px + var(--safe-right)) 0 calc(16px + var(--safe-left));
      pointer-events: none;
    }

    .brand,
    .progress-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 40px;
      padding: 0 10px;
      border: 0;
      border-radius: 0;
      background: transparent;
      backdrop-filter: none;
      box-shadow: none;
      pointer-events: auto;
    }

    .brand {
      position: absolute;
      left: calc(16px + var(--safe-left));
      top: calc(10px + var(--safe-top));
      font-weight: 900;
      letter-spacing: 1px;
      color: #fff;
      text-shadow:
        0 0 1px rgba(0, 0, 0, 0.96),
        0 3px 14px rgba(0, 0, 0, 0.54),
        -1px 0 rgba(0, 0, 0, 0.72),
        1px 0 rgba(0, 0, 0, 0.72),
        0 -1px rgba(0, 0, 0, 0.72),
        0 1px rgba(0, 0, 0, 0.72);
    }

    .brand-icon {
      width: 30px;
      height: 30px;
      display: inline-block;
      object-fit: contain;
      flex: 0 0 auto;
    }

    .brand-name {
      font-size: 16px;
    }

    .progress-pill {
      position: absolute;
      right: calc(16px + var(--safe-right));
      top: calc(10px + var(--safe-top));
      font-size: 14px;
      font-weight: 800;
      color: #fff;
      text-shadow:
        0 0 1px rgba(0, 0, 0, 0.96),
        0 3px 14px rgba(0, 0, 0, 0.54),
        -1px 0 rgba(0, 0, 0, 0.72),
        1px 0 rgba(0, 0, 0, 0.72),
        0 -1px rgba(0, 0, 0, 0.72),
        0 1px rgba(0, 0, 0, 0.72);
    }

    .feed {
      position: relative;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      height: 100vh;
      height: 100dvh;
      overflow-y: auto;
      overflow-x: hidden;
      scroll-snap-type: y mandatory;
      scroll-snap-stop: always;
      overscroll-behavior-y: contain;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      touch-action: pan-y;
    }

    .feed.sixth-swipe-lock {
      touch-action: none;
    }

    .feed::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    .game-slide {
      width: 100%;
      min-width: 0;
      height: 100vh;
      height: 100dvh;
      scroll-snap-align: start;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: calc(58px + var(--safe-top)) 0 0;
    }

    .game-shell {
      position: relative;
      width: 100%;
      min-width: 0;
      height: calc(100vh - 58px - var(--safe-top));
      height: calc(100dvh - 58px - var(--safe-top));
      max-height: none;
      border-radius: 0;
      overflow: hidden;
      border: 0;
      background: transparent;
      box-shadow: none;
      isolation: isolate;
    }

    .game-shell::before {
      display: none;
    }

    .game-shell-inner {
      position: relative;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      height: 100%;
      overflow: hidden;
    }

    .side-actions {
      position: absolute;
      right: calc(42px + var(--safe-right));
      top: 50%;
      z-index: 21;
      transform: translateY(-40%);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .action-button {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 68px;
      min-height: 70px;
      padding: 2px 4px;
      border: 0;
      border-radius: 0;
      background: transparent;
      backdrop-filter: none;
      box-shadow: none;
      cursor: pointer;
      transition: transform 0.18s ease, opacity 0.18s ease;
    }

    .action-button:active,
    .action-button.is-pulsing {
      transform: scale(0.96);
    }

    .action-button span:first-child {
      font-size: 36px;
      line-height: 1;
      color: #fff;
      text-shadow:
        0 0 1px rgba(0, 0, 0, 0.92),
        0 2px 10px rgba(0, 0, 0, 0.58),
        -1px 0 rgba(0, 0, 0, 0.66),
        1px 0 rgba(0, 0, 0, 0.66),
        0 -1px rgba(0, 0, 0, 0.66),
        0 1px rgba(0, 0, 0, 0.66),
        -1px -1px rgba(0, 0, 0, 0.48),
        1px -1px rgba(0, 0, 0, 0.48),
        -1px 1px rgba(0, 0, 0, 0.48),
        1px 1px rgba(0, 0, 0, 0.48);
      font-weight: 900;
    }

    .action-button span:last-child {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.96);
      text-align: center;
      line-height: 1.1;
      text-shadow:
        0 0 1px rgba(0, 0, 0, 0.96),
        0 3px 12px rgba(0, 0, 0, 0.52),
        -1px 0 rgba(0, 0, 0, 0.72),
        1px 0 rgba(0, 0, 0, 0.72),
        0 -1px rgba(0, 0, 0, 0.72),
        0 1px rgba(0, 0, 0, 0.72);
      font-weight: 900;
    }

    .action-button[data-action="like"].is-pulsing {
      opacity: 0.82;
    }

    .game-caption {
      position: absolute;
      left: calc(30px + var(--safe-left));
      right: calc(112px + var(--safe-right));
      bottom: calc(34px + var(--safe-bottom));
      z-index: 22;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      backdrop-filter: none;
      box-shadow: none;
      pointer-events: none;
    }

    .game-caption h2,
    .game-caption p {
      margin: 0;
    }

    .game-caption h2 {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 0.6px;
      color: #fff;
      text-shadow:
        0 2px 14px rgba(0, 0, 0, 0.68),
        0 0 2px rgba(0, 0, 0, 0.86);
    }

    .caption-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 10px;
    }

    .caption-row p {
      font-size: 13px;
      line-height: 1.45;
      color: rgba(255, 255, 255, 0.92);
      flex: 1;
      min-width: 0;
      text-shadow:
        0 2px 10px rgba(0, 0, 0, 0.68),
        0 0 2px rgba(0, 0, 0, 0.86);
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 82px;
      min-height: 30px;
      padding: 0 10px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(0, 0, 0, 0.26);
      color: #fff;
      font-size: 12px;
      white-space: nowrap;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.18);
    }

    .modal {
      position: absolute;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      padding: calc(20px + var(--safe-top)) calc(16px + var(--safe-right)) calc(20px + var(--safe-bottom)) calc(16px + var(--safe-left));
      background: rgba(255, 244, 220, 0.72);
      backdrop-filter: blur(10px);
    }

    .modal.show {
      display: flex;
    }

    .modal-card {
      width: min(100%, 420px);
      max-height: min(84dvh, 760px);
      overflow: auto;
      border-radius: 28px;
      border: 4px solid #171717;
      background:
        radial-gradient(circle at top right, rgba(255, 217, 61, 0.55), transparent 32%),
        radial-gradient(circle at bottom left, rgba(77, 150, 255, 0.28), transparent 28%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(255, 248, 225, 0.98));
      box-shadow: 10px 10px 0 rgba(23, 23, 23, 0.92);
      scrollbar-width: none;
      color: #1f2937;
    }

    .modal-card::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 18px 12px;
    }

    .modal-title {
      font-size: 22px;
      font-weight: 900;
      color: #111827;
    }

    .modal-close {
      width: 40px;
      height: 40px;
      border: 3px solid #171717;
      border-radius: 50%;
      background: #ffffff;
      color: #111827;
      box-shadow: 3px 3px 0 rgba(23, 23, 23, 0.9);
      cursor: pointer;
    }

    .modal-body {
      padding: 0 18px 18px;
      color: #334155;
      line-height: 1.55;
    }

    .modal-body strong {
      color: #0f172a;
    }

    .result-grid {
      display: grid;
      gap: 12px;
      margin-top: 14px;
    }

    .result-card {
      padding: 14px;
      border: 3px solid #171717;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 4px 4px 0 rgba(23, 23, 23, 0.85);
    }

    .result-card h3,
    .result-card p {
      margin: 0;
    }

    .result-card h3 {
      font-size: 15px;
      color: #111827;
      margin-bottom: 6px;
    }

    .result-metrics {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .metric-pill {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 10px;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(34, 211, 238, 0.22), rgba(250, 204, 21, 0.3));
      border: 2px solid #171717;
      color: #0f172a;
      font-size: 12px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    .modal-button,
    .game-button,
    .game-chip {
      border: 0;
      cursor: pointer;
    }

    .modal-button,
    .game-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 18px;
      border-radius: 999px;
      font-weight: 800;
      letter-spacing: 0.2px;
      transition: transform 0.18s ease, opacity 0.18s ease;
    }

    .modal-button:active,
    .game-button:active {
      transform: scale(0.98);
    }

    .modal-button.primary,
    .game-button.primary {
      color: #111827;
      background: linear-gradient(135deg, #22d3ee, #fde047);
      box-shadow: 4px 4px 0 rgba(23, 23, 23, 0.88);
    }

    .modal-button.secondary,
    .game-button.secondary {
      color: #111827;
      background: #ffffff;
      border: 3px solid #171717;
      box-shadow: 4px 4px 0 rgba(23, 23, 23, 0.88);
    }

    .float-layer {
      position: absolute;
      inset: 0;
      z-index: 60;
      pointer-events: none;
      overflow: hidden;
    }

    .float-text {
      position: absolute;
      right: 92px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 79, 138, 0.9);
      color: #fff;
      font-size: 13px;
      font-weight: 900;
      animation: float-up 1s ease forwards;
      box-shadow: 0 14px 30px rgba(255, 79, 138, 0.3);
    }

    @keyframes float-up {
      0% {
        opacity: 0;
        transform: translateY(12px) scale(0.92);
      }
      18% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translateY(-46px) scale(1);
      }
    }

    .game-screen {
      position: absolute;
      inset: 0;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .game-screen-scroll {
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: none;
    }

    .game-screen-scroll::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    .game-panel {
      position: relative;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
    }

    .tilt-left {
      transform: rotate(-1deg);
    }

    .tilt-right {
      transform: rotate(0.9deg);
    }

    .game-heading {
      font-size: clamp(28px, 7vw, 38px);
      font-weight: 900;
      line-height: 1.05;
      margin: 0;
    }

    .game-copy {
      margin: 0;
      line-height: 1.55;
      color: rgba(255, 255, 255, 0.78);
    }

    .hint-up {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
      color: rgba(255, 255, 255, 0.72);
      font-size: 12px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    .footer-scratch {
      text-align: center;
      font-size: 11px;
      line-height: 1.45;
      opacity: 0.76;
    }

    .tag-list {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 10px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.06);
      font-size: 12px;
      color: var(--text);
    }

    .quiz-root {
      position: relative;
      color: #171717;
      background:
        repeating-linear-gradient(
          180deg,
          rgba(80, 154, 255, 0.14) 0,
          rgba(80, 154, 255, 0.14) 2px,
          transparent 2px,
          transparent 34px
        ),
        linear-gradient(90deg, rgba(255, 120, 120, 0.2) 0, rgba(255, 120, 120, 0.2) 3px, transparent 3px, transparent 52px),
        linear-gradient(180deg, #f7f0cb 0%, #ede3b2 100%);
    }

    .quiz-root::before,
    .quiz-root::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      pointer-events: none;
      opacity: 0.5;
      filter: blur(0.5px);
    }

    .quiz-root::before {
      width: 44vw;
      height: 44vw;
      left: -14vw;
      top: 14vh;
      background: radial-gradient(circle, rgba(255, 92, 87, 0.22), transparent 72%);
    }

    .quiz-root::after {
      width: 32vw;
      height: 32vw;
      right: -10vw;
      bottom: 16vh;
      background: radial-gradient(circle, rgba(88, 166, 255, 0.22), transparent 72%);
    }

    .quiz-screen {
      padding: 14px;
      gap: 10px;
    }

    .quiz-sheet {
      background: rgba(255, 251, 235, 0.93);
      padding: 14px 12px;
      border: 4px solid #171717;
      box-shadow: 6px 6px 0 rgba(23, 23, 23, 0.14);
      border-radius: 20px;
    }

    .quiz-sheet::before {
      content: "";
      position: absolute;
      inset: 10px;
      border: 2px dashed rgba(23, 23, 23, 0.16);
      border-radius: 16px;
      pointer-events: none;
    }

    .quiz-meter {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 8px;
    }

    .quiz-meter-card {
      padding: 10px 12px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.82);
      border: 3px solid #171717;
    }

    .quiz-meter-card b {
      display: block;
      font-size: 18px;
      margin-top: 4px;
    }

    .quiz-question {
      padding: 18px;
      background: rgba(255, 251, 235, 0.92);
      border: 4px solid #171717;
    }

    .quiz-question-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      color: rgba(23, 23, 23, 0.72);
      font-size: 13px;
    }

    .quiz-question h3 {
      margin: 0;
      font-size: 22px;
      line-height: 1.42;
    }

    .option-list {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    .option-button {
      padding: 14px 16px;
      border-radius: 20px;
      border: 3px solid #171717;
      background: #fff9e8;
      color: #171717;
      text-align: left;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .option-button:hover,
    .option-button:active {
      transform: translateY(-1px);
      border-color: #171717;
      background: #fff3cc;
    }

    .quiz-result-card {
      margin-top: 0;
      padding: 18px;
      display: grid;
      gap: 14px;
      background: rgba(255, 251, 235, 0.94);
      border: 4px solid #171717;
      color: #171717;
    }

    .quiz-result-card h3 {
      margin: 8px 0 6px;
      font-size: 28px;
    }

    .quiz-result-hero {
      display: grid;
      grid-template-columns: minmax(114px, 132px) 1fr;
      gap: 14px;
      align-items: center;
    }

    .quiz-result-portrait {
      position: relative;
      min-height: 164px;
      padding: 12px;
      border: 4px solid #171717;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 5px 5px 0 rgba(23, 23, 23, 0.12);
      background:
        radial-gradient(circle at 24% 24%, rgba(255, 255, 255, 0.9), transparent 32%),
        linear-gradient(145deg, #fff6cc, #dff2ff);
    }

    .quiz-result-portrait::after {
      content: "火柴人画像";
      position: absolute;
      left: 10px;
      bottom: 10px;
      padding: 2px 8px;
      border: 2px solid #171717;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.08em;
    }

    .quiz-result-portrait-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 132px;
      padding-bottom: 18px;
    }

    .quiz-result-portrait-icon svg {
      width: 100%;
      height: 100%;
      max-width: 110px;
      max-height: 110px;
      overflow: visible;
    }

    .quiz-result-copy {
      display: grid;
      gap: 8px;
    }

    .quiz-result-copy .game-copy {
      font-size: 13px;
      line-height: 1.6;
    }

    .quiz-result-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }

    .quiz-result-story,
    .quiz-result-note {
      padding: 14px;
      border: 3px solid #171717;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 4px 4px 0 rgba(23, 23, 23, 0.08);
    }

    .quiz-result-story-title {
      margin-bottom: 8px;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(23, 23, 23, 0.68);
    }

    .quiz-result-meter {
      margin-top: 2px;
    }

</head>
<body>
  <div id="app" class="hakidou-app">
    <header class="app-topbar">
      <div class="brand">
        <img class="brand-icon" src="./assets/images/logo.png" alt="logo">
        <span class="brand-name">哈基抖</span>

      <div class="progress-pill" id="currentIndexText">第 1 刷</div>
    </header>

    <main id="feed" class="feed">
      <section class="game-slide" data-index="0" data-game-id="sixth">
        <div class="game-shell"><div class="game-shell-inner" id="game-sixth"></div></div>
        <div class="sixth-swipe-hint" id="sixthSwipeHint">再滑一次切换游戏</div>
      </section>
      <section class="game-slide" data-index="1" data-game-id="quiz">
        <div class="game-shell"><div class="game-shell-inner" id="game-quiz"></div></div>
      </section>
      <section class="game-slide" data-index="2" data-game-id="fifth">
        <div class="game-shell"><div class="game-shell-inner" id="game-fifth"></div></div>
      </section>
      <section class="game-slide" data-index="3" data-game-id="beans">
        <div class="game-shell"><div class="game-shell-inner" id="game-beans"></div></div>
      </section>
      <section class="game-slide" data-index="4" data-game-id="wangma">
        <div class="game-shell"><div class="game-shell-inner" id="game-wangma"></div></div>
      </section>
      <section class="game-slide" data-index="5" data-game-id="twist">
        <div class="game-shell"><div class="game-shell-inner" id="game-twist"></div></div>
      </section>
      <section class="game-slide" data-index="6" data-game-id="eighth">
        <div class="game-shell"><div class="game-shell-inner" id="game-eighth"></div></div>
      </section>
    </main>

    <aside class="side-actions">
      <button class="action-button" data-action="like">
        <span>♡</span>
        <span>哈一下</span>
      </button>
      <button class="action-button" data-action="restart">
        <span>↻</span>
        <span>重玩</span>
      </button>
      <button class="action-button" data-action="rule">
        <span>?</span>
        <span>规则</span>
      </button>
      <button class="action-button" data-action="result">
        <span>🏁</span>
        <span>结算</span>
      </button>
    </aside>

    <footer class="game-caption">
      <h2 id="gameTitle">合成大奶龙</h2>
      <div class="caption-row">
        <p id="gameDesc">拖动投放小奶龙，撞出更大的龙。</p>
        <span class="status-pill" id="gameStatusText">未开始</span>
      </div>
    </footer>

    <div id="overlayModal" class="modal" aria-hidden="true">
      <div class="modal-card">
        <div class="modal-header">
          <div class="modal-title" id="modalTitle">说明</div>
          <button class="modal-close" id="modalClose" aria-label="关闭">✕</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
      </div>
    </div>

    <div id="floatLayer" class="float-layer"></div>
  </div>

  <script>
    const APP_STORAGE_KEY = "hakidou_app_state_v1";
    const FEED_META = [
      {
        id: "sixth",
        title: "合成大奶龙",
        desc: "拖动投放小奶龙，撞出更大的龙。",
        rule: [
          "拖动投放预览球，碰到相同等级会合成升级。",
          "顶部警戒线亮红就代表快要顶住了。",
          "堆得越高分越多，顶爆就结束。"
        ]
      },
      {
        id: "quiz",
        title: "赛博命格测试",
        desc: "4 道快答题，破电脑给你打印网感命格单。",
        rule: [
          "每题都要立刻选，不必追求正确。",
          "超时会被系统判定为灵魂卡顿。",
          "最终命格由网感、抽象、尴尬三项综合决定。"
        ]
      },
      {
        id: "fifth",
        title: "抓梗鹅",
        desc: "抓热梗、避黑话，三连就能清台。",
        rule: [
          "点击牌堆里的热梗，把相同梗尽量凑成三连。",
          "别让黑话塞满槽位，不然会被工位反杀。",
          "抓完所有热梗即可通关，剩余时间会转成额外分数。"
        ]
      },
      {
        id: "beans",
        title: "绿豆接接乐",
        desc: "左右拖动小绿猫接豆，绿豆加分，红豆扣分。",
        rule: [
          "按住底部控制区左右拖动。",
          "绿豆 +10 分，红豆 -8 分。",
          "结果页会停留在当前屏，想继续就上滑。"
        ]
      },
      {
        id: "wangma",
        title: "霸总王妈短剧观察",
        desc: "3 幕豪门抽象秀，选出王妈最体面的反应。",
        rule: [
          "每一幕选一个反应。",
          "选完会立刻收到吐槽反馈。",
          "最后根据清醒值、体面值和吃瓜值结算称号。"
        ]
      },
      {
        id: "twist",
        title: "果冻风猫爪拧螺丝",
        desc: "按层拆果冻钉，别把自己拧进情绪死结。",
        rule: [
          "优先点当前露在外面的果冻钉。",
          "点到被挡住的钉子会涨拧巴值。",
          "拆完得更高分，拧巴值爆表会提前失败。"
        ]
      },
      {
        id: "eighth",
        title: "猫meme消消乐",
        desc: "交换相邻猫图，凑出三连就能消除。",
        rule: [
          "点一张，再点相邻一张，或者直接滑动交换。",
          "只有凑出三连才算有效消除。",
          "20 步用完前清空棋盘就算赢。"
        ]
      }
    ];

    function createInitialGames() {
      const games = {};
      FEED_META.forEach((meta) => {
        games[meta.id] = createEmptyGameState();
      });
      return games;
    }

    const AppState = {
      currentIndex: 0,
      likes: 0,
      games: createInitialGames()
    };

    function createEmptyGameState() {
      return {
        status: "not-started",
        score: 0,
        finished: false,
        title: "",
        summary: "",
        tags: [],
        likes: 0
      };
    }

    const elements = {
      feed: document.getElementById("feed"),
      title: document.getElementById("gameTitle"),
      desc: document.getElementById("gameDesc"),
      status: document.getElementById("gameStatusText"),
      indexText: document.getElementById("currentIndexText"),
      modal: document.getElementById("overlayModal"),
      modalTitle: document.getElementById("modalTitle"),
      modalBody: document.getElementById("modalBody"),
      modalClose: document.getElementById("modalClose"),
      floatLayer: document.getElementById("floatLayer"),
      actionButtons: Array.from(document.querySelectorAll(".action-button")),
      slides: Array.from(document.querySelectorAll(".game-slide"))
    };

    const gameFactories = {
      quiz: createQuizGame,
      twist: createTwistGame,
      wangma: createWangmaGame,
      beans: createBeansGame,
      fifth: createFifthGame,
      sixth: createSixthGame,
      eighth: createEighthGame
    };

    const gameInstances = new Map();
    let currentGameId = FEED_META[0].id;
    let currentIndex = 0;
    let observer = null;
    let loopJumpLock = false;
    let feedTouchStartY = 0;
    let sixthSwipeTargetIndex = null;
    let sixthSwipeHintTimer = null;
    let sixthSwipeLastWheelAt = 0;
    const SIXTH_SWIPE_THRESHOLD = 40;
    const SIXTH_SWIPE_CONFIRM_MS = 2200;
    const SIXTH_WHEEL_GAP_MS = 160;

      loadPersistedState();
    initApp();

    function initApp() {
      bindGlobalActions();
      bindFeedObserver();
      bindLoopNavigation();
      activateGame(0);
    }

    function bindGlobalActions() {
      elements.actionButtons.forEach((button) => {
        button.addEventListener("click", () => {
          const action = button.dataset.action;
          if (action === "like") {
            likeCurrentGame(button);
          } else if (action === "restart") {
            restartCurrentGame();
          } else if (action === "rule") {
            openRuleModal();
          } else if (action === "result") {
            openResultModal();
          }
        });
      });

      elements.modalClose.addEventListener("click", closeModal);
      elements.modal.addEventListener("click", (event) => {
        if (event.target === elements.modal) {
          closeModal();
        }
      });
    }

    function bindFeedObserver() {
      observer = new IntersectionObserver(handleFeedIntersections, {
        root: elements.feed,
        threshold: [0.55, 0.7, 0.85]
      });
      elements.slides.forEach((slide) => observer.observe(slide));
    }

    function bindLoopNavigation() {
      elements.feed.addEventListener("wheel", handleFeedWheelLoop, { passive: false });
      elements.feed.addEventListener("touchstart", handleFeedTouchStart, { passive: true });
      elements.feed.addEventListener("touchmove", handleFeedTouchMove, { passive: false });
      elements.feed.addEventListener("touchend", handleFeedTouchEnd, { passive: true });
      window.addEventListener("message", handleEmbeddedGameMessage);
    }

    function handleFeedWheelLoop(event) {
      if (loopJumpLock) return;
      if (currentIndex === 0) {
        const deltaY = event.deltaY;
        if (Math.abs(deltaY) < 12) return;
        event.preventDefault();
        handleSixthSwipeDelta(deltaY, "wheel");
        return;
      }
      if (currentIndex === FEED_META.length - 1 && event.deltaY > 0 && isFeedNearBottom()) {
        event.preventDefault();
        loopToSlide(0);
        return;
      }
    }

    function handleFeedTouchStart(event) {
      if (!event.changedTouches || !event.changedTouches.length) return;
      feedTouchStartY = event.changedTouches[0].clientY;
    }

    function handleFeedTouchMove(event) {
      if (currentIndex !== 0 || !event.touches || !event.touches.length) return;
      const deltaY = feedTouchStartY - event.touches[0].clientY;
      if (Math.abs(deltaY) < SIXTH_SWIPE_THRESHOLD) return;
      event.preventDefault();
    }

    function handleFeedTouchEnd(event) {
      if (loopJumpLock || !event.changedTouches || !event.changedTouches.length) return;
      const endY = event.changedTouches[0].clientY;
      const deltaY = feedTouchStartY - endY;
      if (currentIndex === 0) {
        if (Math.abs(deltaY) < SIXTH_SWIPE_THRESHOLD) return;
        handleSixthSwipeDelta(deltaY, "touch");
        return;
      }
      if (currentIndex === FEED_META.length - 1 && deltaY > 32 && isFeedNearBottom()) {
        loopToSlide(0);
        return;
      }
    }

    function handleEmbeddedGameMessage(event) {
      const data = event.data;
      if (!data || typeof data !== "object") return;
      if (data.type === "game-nav" && data.target === "sixth") {
        loopToSlide(0);
      }
    }

    function isFeedNearBottom() {
      return elements.feed.scrollTop + elements.feed.clientHeight >= elements.feed.scrollHeight - 24;
    }

    function isFeedNearTop() {
      return elements.feed.scrollTop <= 24;
    }

    function loopToSlide(index) {
      if (loopJumpLock) return;
      loopJumpLock = true;
      goToSlide(index, { behavior: "instant" });
      window.setTimeout(() => {
        loopJumpLock = false;
      }, 420);
    }

    function updateFeedGestureMode() {
      const isSixthGame = currentIndex === 0;
      elements.feed.classList.toggle("sixth-swipe-lock", isSixthGame);
      if (!isSixthGame) {
        resetSixthSwipeGuard();
      }
    }

    function resetSixthSwipeGuard() {
      sixthSwipeTargetIndex = null;
      sixthSwipeLastWheelAt = 0;
      if (sixthSwipeHintTimer) {
        window.clearTimeout(sixthSwipeHintTimer);
        sixthSwipeHintTimer = null;
      }
      const hint = document.getElementById("sixthSwipeHint");
      if (hint) hint.classList.remove("visible");
    }

    function armSixthSwipeGuard(targetIndex) {
      sixthSwipeTargetIndex = targetIndex;
      const hint = document.getElementById("sixthSwipeHint");
      if (hint) {
        hint.textContent = "再滑一次切换游戏";
        hint.classList.add("visible");
      }
      if (sixthSwipeHintTimer) window.clearTimeout(sixthSwipeHintTimer);
      sixthSwipeHintTimer = window.setTimeout(() => {
        resetSixthSwipeGuard();
      }, SIXTH_SWIPE_CONFIRM_MS);
    }

    function commitSixthSwipe(targetIndex) {
      resetSixthSwipeGuard();
      if (targetIndex === 1) {
        goToSlide(1);
      } else {
        loopToSlide(FEED_META.length - 1);
      }
    }

    function handleSixthSwipeDelta(deltaY, source) {
      if (Math.abs(deltaY) < SIXTH_SWIPE_THRESHOLD) return false;
      const targetIndex = deltaY > 0 ? 1 : FEED_META.length - 1;
      if (source === "wheel") {
        const now = Date.now();
        const isNewGesture = now - sixthSwipeLastWheelAt > SIXTH_WHEEL_GAP_MS;
        sixthSwipeLastWheelAt = now;
        if (sixthSwipeTargetIndex === targetIndex && isNewGesture) {
          commitSixthSwipe(targetIndex);
        } else if (isNewGesture || sixthSwipeTargetIndex !== targetIndex) {
          armSixthSwipeGuard(targetIndex);
        }
        return true;
      }
      if (sixthSwipeTargetIndex === targetIndex) {
        commitSixthSwipe(targetIndex);
      } else {
        armSixthSwipeGuard(targetIndex);
      }
      return true;
    }

    function handleFeedIntersections(entries) {
      const visible = entries
        .filter((entry) => entry.isIntersecting)
        .sort((a, b) => b.intersectionRatio - a.intersectionRatio);
      if (!visible.length) return;
      const nextIndex = Number(visible[0].target.dataset.index);
      if (Number.isFinite(nextIndex) && nextIndex !== currentIndex) {
        activateGame(nextIndex);
      }
    }

    function ensureGame(gameId) {
      if (gameInstances.has(gameId)) return gameInstances.get(gameId);
      const container = document.getElementById("game-" + gameId);
      const context = createGameContext(gameId);
      const instance = gameFactories[gameId](container, context);
      instance.mount(container, context);
      gameInstances.set(gameId, instance);
      return instance;
    }

    function activateGame(nextIndex) {
      const prevId = FEED_META[currentIndex] ? FEED_META[currentIndex].id : null;
      const nextMeta = FEED_META[nextIndex];
      if (!nextMeta) return;

      if (prevId && prevId !== nextMeta.id && gameInstances.has(prevId)) {
        gameInstances.get(prevId).pause();
      }

      const nextGame = ensureGame(nextMeta.id);
      if (!nextGame.__entered) {
        nextGame.start();
        nextGame.__entered = true;
      } else {
        nextGame.resume();
      }

      currentIndex = nextIndex;
      currentGameId = nextMeta.id;
      AppState.currentIndex = nextIndex;
      updateFeedGestureMode();
      updateCaption();
      persistState();
    }

    function updateCaption() {
      const meta = FEED_META[currentIndex];
      const gameState = AppState.games[meta.id];
      elements.indexText.textContent = "第 " + (currentIndex + 1) + " 刷";
      elements.title.textContent = meta.title;
      elements.desc.textContent = meta.desc;
      elements.status.textContent = getStatusText(gameState);
    }

    function getStatusText(gameState) {
      if (gameState.finished && gameState.title) {
        return gameState.title;
      }
      if (gameState.status === "playing") return "进行中";
      if (gameState.status === "paused") return "已暂停";
      return "未开始";
    }

    function createGameContext(gameId) {
      return {
        getAppState() {
          return AppState;
        },
        setStatus(status) {
          AppState.games[gameId].status = status;
          if (currentGameId === gameId) updateCaption();
          persistState();
        },
        setSummary(patch) {
          Object.assign(AppState.games[gameId], patch || {});
          if (currentGameId === gameId) updateCaption();
          persistState();
        },
        finishGame(payload) {
          const target = AppState.games[gameId];
          target.status = "finished";
          target.finished = true;
          target.score = payload.score || 0;
          target.title = payload.title || "";
          target.summary = payload.summary || "";
          target.tags = Array.isArray(payload.tags) ? payload.tags.slice(0, 3) : [];
          target.result = payload;
          if (currentGameId === gameId) updateCaption();
          persistState();
        },
        showToast(message) {
          showFloatText(message);
        }
      };
    }

    function likeCurrentGame(button) {
      const gameState = AppState.games[currentGameId];
      gameState.likes += 1;
      AppState.likes += 1;
      button.classList.add("is-pulsing");
      window.setTimeout(() => button.classList.remove("is-pulsing"), 220);
      showFloatText("哈基米 +1");
      persistState();
    }

    function restartCurrentGame() {
      const game = ensureGame(currentGameId);
      AppState.games[currentGameId] = createEmptyGameState();
      game.reset();
      updateCaption();
      showFloatText("重新开刷");
      persistState();
    }

    function openRuleModal() {
      const meta = FEED_META[currentIndex];
      const html = [
        "<p><strong>" + meta.title + "</strong></p>",
        "<div class='result-grid'>",
        meta.rule.map((line) => "<div class='result-card'><p>" + escapeHtml(line) + "</p></div>").join(""),
        "</div>"
      ].join("");
      openModal("本刷规则", html);
    }

    function openResultModal() {
      const completedCount = FEED_META.filter((meta) => AppState.games[meta.id].finished).length;
      const totalScore = FEED_META.reduce((sum, meta) => sum + Number(AppState.games[meta.id].score || 0), 0);
      const finalTitle = computeFinalTitle(totalScore, completedCount, AppState.likes);
      const finalCopy = "我在哈基抖刷出了「" + finalTitle + "」，目前总分 " + totalScore + "，哈一下次数 " + AppState.likes + "。";
      const cards = FEED_META.map((meta) => {
        const state = AppState.games[meta.id];
        const title = state.finished ? state.title : "还没刷完";
        const summary = state.finished ? state.summary : "这一刷还没出结论，想补完可以直接滑回去。";
        const tags = state.finished ? state.tags : ["待完成"];
        return [
          "<div class='result-card'>",
          "<h3>" + escapeHtml(meta.title) + "</h3>",
          "<p>" + escapeHtml(summary) + "</p>",
          "<div class='result-metrics'>",
          "<span class='metric-pill'>得分 " + Number(state.score || 0) + "</span>",
          tags.map((tag) => "<span class='metric-pill'>" + escapeHtml(tag) + "</span>").join(""),
          "</div>",
          "<p style='margin-top:10px;color:#0f172a;'>" + escapeHtml(title) + "</p>",
          "</div>"
        ].join("");
      }).join("");

      const html = [
        "<p><strong>全局刷游人格：</strong>" + escapeHtml(finalTitle) + "</p>",
        "<p>已完成 " + completedCount + " / " + FEED_META.length + " 刷，累计得分 <strong>" + totalScore + "</strong>，累计哈一下 <strong>" + AppState.likes + "</strong>。</p>",
        completedCount < FEED_META.length ? "<p>你还有 " + (FEED_META.length - completedCount) + " 刷没刷完，但现在也能先出一版人格。</p>" : "",
        "<div class='result-grid'>" + cards + "</div>",
        "<div class='result-card' style='margin-top:14px;'>",
        "<h3>分享文案</h3>",
        "<p>" + escapeHtml(finalCopy) + "</p>",
        "</div>",
        "<div class='modal-actions'>",
        "<button class='modal-button primary' id='restartAllButton'>全部重刷</button>",
        "<button class='modal-button secondary' id='closeResultButton'>先这样</button>",
        "</div>"
      ].join("");

      openModal("全局结算", html, () => {
        const restartButton = document.getElementById("restartAllButton");
        const closeButton = document.getElementById("closeResultButton");
        if (restartButton) {
          restartButton.addEventListener("click", restartAllGames);
        }
        if (closeButton) {
          closeButton.addEventListener("click", closeModal);
        }
      });
    }

    function restartAllGames() {
      AppState.likes = 0;
      FEED_META.forEach((meta) => {
        AppState.games[meta.id] = createEmptyGameState();
        if (gameInstances.has(meta.id)) {
          gameInstances.get(meta.id).reset();
        }
      });
      closeModal();
      goToSlide(0);
      showFloatText("全部刷游已清空");
      persistState();
    }

    function goToSlide(index, options = {}) {
      const nextSlide = elements.slides[index];
      if (!nextSlide) return;
      const behavior = options.behavior || "smooth";
      nextSlide.scrollIntoView({ behavior, block: "start" });
      activateGame(index);
    }

    function computeFinalTitle(totalScore, completedCount, likes) {
      if (completedCount >= FEED_META.length) return totalScore >= 1200 ? "刷游区全冠王" : "刷游区全通者";
      if (totalScore >= 650) return "高浓度网感幸存者";
      if (likes >= 8) return "不拧巴哈基米";
      if (completedCount <= 1) return "抽象但能赢";
      return "赛博命格稳定发挥者";
    }

    function openModal(title, html, onOpen) {
      elements.modalTitle.textContent = title;
      elements.modalBody.innerHTML = html;
      elements.modal.classList.add("show");
      elements.modal.setAttribute("aria-hidden", "false");
      if (typeof onOpen === "function") onOpen();
    }

    function closeModal() {
      elements.modal.classList.remove("show");
      elements.modal.setAttribute("aria-hidden", "true");
      elements.modalBody.innerHTML = "";
    }

    function showFloatText(message) {
      const node = document.createElement("div");
      node.className = "float-text";
      node.textContent = message;
      node.style.top = (window.innerHeight * 0.45 + Math.random() * 32) + "px";
      elements.floatLayer.appendChild(node);
      window.setTimeout(() => node.remove(), 980);
    }

    function persistState() {
      try {

      function getState() {

      function renderIntro() {
        state.phase = "intro";

      function startGame() {
        clearTimer();
        state = getInitialState();
        state.phase = "playing";
        context.setSummary({ status: "playing", finished: false, title: "", summary: "", tags: [], score: 0 });
        context.setStatus("playing");
        refs.start.style.display = "none";
        refs.result.style.display = "none";

        renderPile();
        renderSlots();

      function generatePile() {
        const pile = [];
        for (let i = 0; i < TOTAL_MEME_SETS; i++) {
          const meme = MEMES[Math.floor(Math.random() * MEMES.length)];
          for (let j = 0; j < 3; j++) {
            pile.push({
              ...meme,
              uid: `meme_${i}_${j}_${Date.now()}_${Math.random().toString(36).slice(2, 6)}`,
              posX: 8 + Math.random() * 64,
              posY: 6 + Math.random() * 62,
              rotation: -25 + Math.random() * 50,
              zIndex: Math.floor(Math.random() * 100)
            });
          }
        }
        for (let i = 0; i < TOTAL_TRAPS; i++) {
          const trap = JARGONS[Math.floor(Math.random() * JARGONS.length)];
          pile.push({
            ...trap,
            uid: `trap_${i}_${Date.now()}_${Math.random().toString(36).slice(2, 6)}`,
            posX: 8 + Math.random() * 64,
            posY: 6 + Math.random() * 62,
            rotation: -25 + Math.random() * 50,
            zIndex: Math.floor(Math.random() * 100)
          });
        }
        state.pile = pile.sort(() => Math.random() - 0.5);
      }

      function renderPile() {
        refs.pile.innerHTML = "";
        state.pile.forEach((item) => {
          const el = document.createElement("button");
          el.type = "button";
          el.className = "fifth-item";
          el.style.left = item.posX + "%";
          el.style.top = item.posY + "%";
          el.style.transform = `rotate(${item.rotation}deg)`;
          el.style.zIndex = item.zIndex;
          el.style.background = item.bg;
          el.style.color = item.color;
          el.innerHTML = `<div class="icon">${item.emoji}</div><div class="name">${escapeHtml(item.name)}</div>`;
          el.addEventListener("pointerdown", (event) => handleItemClick(item.uid, event));
          refs.pile.appendChild(el);
        });
      }

      function handleItemClick(uid, event) {
        event.preventDefault();
        if (state.processing || state.finished || state.phase !== "playing") return;
        if (state.slots.length >= SLOT_CAPACITY) return;
        const index = state.pile.findIndex((item) => item.uid === uid);
        if (index === -1) return;
        const item = state.pile[index];
        const rect = container.getBoundingClientRect();
        showFeedback(event.clientX - rect.left, event.clientY - rect.top, item.type);
        state.pile.splice(index, 1);
        state.slots.push(item);
        state.slots.sort((a, b) => {
          if (a.type === "trap" && b.type !== "trap") return 1;
          if (b.type === "trap" && a.type !== "trap") return -1;
          return a.id.localeCompare(b.id);
        });
        renderPile();
        renderSlots();
        checkMatches();
      }

      function showFeedback(x, y, type) {
        const fb = document.createElement("div");
        fb.className = "fifth-float";
        fb.style.left = Math.max(8, x - 20) + "px";
        fb.style.top = Math.max(8, y - 20) + "px";
        fb.style.background = type === "meme" ? "rgba(34, 197, 94, 0.92)" : "rgba(239, 68, 68, 0.92)";
        fb.style.color = "#fff";
        fb.textContent = type === "meme" ? "✨ Get!" : "❌ 染上班味!";
        refs.feedback.appendChild(fb);
        window.setTimeout(() => fb.remove(), 800);
      }

      function renderSlots() {
        refs.slots.innerHTML = "";
        refs.slotCount.textContent = String(state.slots.length);
        state.slots.forEach((item) => {
          const el = document.createElement("div");
          el.className = "fifth-slot";
          el.style.background = item.type === "trap" ? "#cbd5e1" : item.bg;
          el.style.color = item.color;
          el.style.border = "1px solid rgba(255,255,255,0.18)";
          el.innerHTML = `<div class="icon">${item.emoji}</div><div class="name">${escapeHtml(item.name)}</div>`;
          refs.slots.appendChild(el);
        });
        refs.slotCount.classList.toggle("text-red-400", state.slots.length >= SLOT_CAPACITY);
      }

      async function checkMatches() {
        const counts = {};
        state.slots.forEach((item) => {
          if (item.type === "meme") counts[item.id] = (counts[item.id] || 0) + 1;
        });
        const matchedId = Object.keys(counts).find((id) => counts[id] >= 3);
        if (matchedId) {
          state.processing = true;
          const removeCount = {};
          state.slots = state.slots.filter((item) => {
            if (item.id !== matchedId) return true;
            removeCount[item.id] = (removeCount[item.id] || 0) + 1;
            return removeCount[item.id] > 3;
          });
          state.score += 100;
          state.timeRemaining = Math.min(GAME_TIME, state.timeRemaining + 3);
          renderSlots();
          updateHud();
          state.processing = false;
          if (!state.pile.some((item) => item.type === "meme") && !state.slots.some((item) => item.type === "meme")) {
            finishGame(true, "成功清空所有热梗");
            return;
          }
        } else if (state.slots.length >= SLOT_CAPACITY) {
          finishGame(false, state.slots.every((item) => item.type === "trap") ? "工位已完全被黑话吞噬" : "工位爆满，理不清逻辑");
        }
      }

      function startTimer() {
        clearTimer();
        timer = window.setInterval(() => {
          if (state.phase !== "playing") return;
          state.timeRemaining -= 1;
          updateHud();
          if (state.timeRemaining <= 0) {
            finishGame(false, "下班时间到，KPI未达标");
          }
        }, 1000);
      }

      function updateHud() {
        refs.time.textContent = String(state.timeRemaining);
        refs.score.textContent = String(state.score);
      }

      function clearTimer() {
        if (timer) {
          window.clearInterval(timer);
          timer = null;
        }
      }

      function finishGame(isWin, reason) {
        if (state.finished) return;
        state.finished = true;
        state.phase = "result";
        clearTimer();
        const finalScore = state.score + Math.max(0, state.timeRemaining) * 4;
        let title = isWin ? "游戏成功" : "游戏失败";
        let subtitle = isWin ? "5G冲浪泰斗" : "班味重度患者";
        let desc = isWin
          ? "达成：" + reason + "。你的精神状态遥遥领先，没有任何职场黑话能禁锢你！"
          : "死因：" + reason + "。你已被PPT腌入味。建议立即申请带薪拉屎，补充哈基米能量！";
        if (isWin && finalScore >= 500) {
          title = "游戏成功";
          subtitle = "5G冲浪泰斗";
        }
        context.finishGame({
          score: finalScore,
          title,
          summary: desc,
          tags: ["热梗 " + state.score, "剩余 " + state.timeRemaining + "s", isWin ? "清台成功" : "工位爆满"]
        });
        refs.finalScore.textContent = String(finalScore);
        refs.resultTitle.textContent = title;
        refs.resultTitle.style.color = isWin ? "#16a34a" : "#dc2626";
        refs.resultSubtitle.textContent = subtitle;
        refs.finalScore.style.color = "#111827";
        refs.resultDesc.innerHTML = escapeHtml(desc);
        refs.start.style.display = "none";
        refs.result.style.display = "flex";
      }

      return { mount, start, pause, resume, reset, destroy, getState };
    }

        if (!Engine || !Runner || !Bodies || !Composite || !Events) return;
        state.width = refs.area.clientWidth;

        const wallOptions = { isStatic: true, render: { visible: false } };

        const rightWall = Bodies.rectangle(state.width + 30, state.height / 2, 60, state.height * 2, wallOptions);
        Composite.add(engine.world, [ground, leftWall, rightWall]);
        Events.on(engine, "afterUpdate", syncDOM);
        Events.on(engine, "collisionStart", handleMerge);
        refs.area.addEventListener("pointerdown", handlePointerMove);
        refs.area.addEventListener("pointermove", handlePointerMove);
        refs.area.addEventListener("pointerup", handleDrop);
        refs.area.addEventListener("contextmenu", (e) => e.preventDefault());
        resizeHandler = () => resizePhysics();
        window.addEventListener("resize", resizeHandler);
      }

        if (!refs || !state) return;
        state.width = refs.area.clientWidth;
        state.height = refs.area.clientHeight;

        state.dropX = clamp(state.dropX || state.width / 2, 0, state.width);

        if (state.phase === "playing" && runner) {
          if (!runnerActive) {
            Runner.run(runner, engine);
            runnerActive = true;
          }
          context.setStatus("playing");
        }
      }

        resetResultAudio();
        renderIntro();
        context.setSummary({ status: "not-started", finished: false, title: "", summary: "", tags: [], score: 0 });
      }

      function destroy() {
        if (runner) Runner.stop(runner);
        runnerActive = false;
        if (resizeHandler) window.removeEventListener("resize", resizeHandler);
        stopResultAudio();
      }

      function getState() {
        return state;
      }

      function renderIntro() {
        state.phase = "intro";
        refs.start.style.display = "flex";
        refs.result.style.display = "none";
        refs.preview.style.display = "none";
        refs.aim.style.display = "none";
        refs.warning.classList.remove("danger");
        refs.area.querySelectorAll(".sixth-fruit:not(.sixth-preview)").forEach((node) => node.remove());
      }

      function startGame() {
        if (!engine) initPhysics();
        clearWorld();
        state = getInitialState();
        state.phase = "playing";
        state.score = 0;
        state.dropX = refs.area.clientWidth / 2;
        state.nextLevel = Math.floor(Math.random() * 4);
        if (runner && engine && !runnerActive) {
          Runner.run(runner, engine);
          runnerActive = true;
        }
        context.setSummary({ status: "playing", finished: false, title: "", summary: "", tags: [], score: 0 });
        context.setStatus("playing");
        refs.start.style.display = "none";
        refs.result.style.display = "none";
        refs.preview.style.display = "flex";
        refs.aim.style.display = "block";
        updatePreview();
      }

      function clearWorld() {
        if (!engine) return;
        const bodies = engine.world.bodies.slice();
        bodies.forEach((body) => {
          if (body.label === "fruit") Composite.remove(engine.world, body);
        });
        state.fruitsData.forEach((data) => data.el.remove());
        state.fruitsData = [];
        mergeSet.clear();
        refs.area.querySelectorAll(".sixth-fruit:not(.sixth-preview)").forEach((node) => node.remove());
      }

      function updatePreview() {
        const conf = FRUITS[state.nextLevel];
        const minX = conf.r;
        const maxX = refs.area.clientWidth - conf.r;
        state.dropX = Math.max(minX, Math.min(state.dropX, maxX));
        refs.preview.className = "sixth-fruit sixth-preview";
        refs.preview.style.width = conf.r * 2 + "px";
        refs.preview.style.height = conf.r * 2 + "px";
        refs.preview.style.left = state.dropX - conf.r + "px";
        refs.preview.style.top = "36px";
        refs.preview.style.display = "flex";
        refs.preview.style.background = "#fff7ed";
        refs.preview.innerHTML = `<img src="${conf.image}" alt="奶龙等级 ${conf.level}">`;
        refs.aim.style.left = state.dropX + "px";
        refs.aim.style.display = "block";
      }

      function handlePointerMove(e) {
        if (state.phase !== "playing" || !state.canDrop) return;
        const rect = refs.area.getBoundingClientRect();
        state.dropX = e.clientX - rect.left;
        updatePreview();
      }

      function handleDrop() {
        if (state.phase !== "playing" || !state.canDrop) return;
        state.canDrop = false;
        refs.preview.style.display = "none";
        refs.aim.style.display = "none";
        spawnFruit(state.dropX, 40 + FRUITS[state.nextLevel].r, state.nextLevel);
        window.setTimeout(() => {
          if (state.phase === "playing") {
            state.nextLevel = Math.floor(Math.random() * 5);
            state.canDrop = true;
            updatePreview();
          }
        }, 650);
      }

      function spawnFruit(x, y, level) {
        const conf = FRUITS[level];
        const el = document.createElement("div");
        el.className = "sixth-fruit";
        el.style.width = conf.r * 2 + "px";
        el.style.height = conf.r * 2 + "px";
        el.style.left = x - conf.r + "px";
        el.style.top = y - conf.r + "px";
        el.style.background = "#fff7ed";
        el.innerHTML = `<img src="${conf.image}" alt="奶龙等级 ${conf.level}">`;
        refs.area.appendChild(el);
        const body = Bodies.circle(x, y, conf.r, {
          restitution: 0.2,
          friction: 0.1,
          density: 0.001 * (level + 1),
          label: "fruit",
          render: { visible: false }
        });
        body.fruitLevel = level;
        body.fruitId = Math.random().toString(36).slice(2, 11);
        Composite.add(engine.world, body);
        state.fruitsData.push({ body, el, level, id: body.fruitId });
      }

      function syncDOM() {
        if (state.phase !== "playing") return;
        let hasDanger = false;
        const warningY = refs.area.clientHeight * 0.15;
        state.fruitsData.forEach((data) => {
          const b = data.body;
          const conf = FRUITS[data.level];
          data.el.style.left = b.position.x - conf.r + "px";
          data.el.style.top = b.position.y - conf.r + "px";
          data.el.style.transform = "rotate(" + b.angle + "rad)";
          if (b.position.y - conf.r < warningY) hasDanger = true;
        });
        if (hasDanger) {
          state.dangerTimer += 1;
          refs.warning.classList.add("danger");
          if (state.dangerTimer > 90) {
            triggerGameOver();
          }
        } else {
          state.dangerTimer = 0;
          refs.warning.classList.remove("danger");
        }
        mergeSet.clear();
      }

      function handleMerge(event) {
        if (state.phase !== "playing") return;
        event.pairs.forEach((pair) => {
          const a = pair.bodyA;
          const b = pair.bodyB;
          if (a.label === "fruit" && b.label === "fruit" && a.fruitLevel === b.fruitLevel) {
            if (mergeSet.has(a.fruitId) || mergeSet.has(b.fruitId)) return;
            mergeSet.add(a.fruitId);
            mergeSet.add(b.fruitId);
            Composite.remove(engine.world, [a, b]);
            const dataA = state.fruitsData.find((f) => f.id === a.fruitId);
            const dataB = state.fruitsData.find((f) => f.id === b.fruitId);
            if (dataA) dataA.el.remove();
            if (dataB) dataB.el.remove();
            state.fruitsData = state.fruitsData.filter((f) => f.id !== a.fruitId && f.id !== b.fruitId);
            const midX = (a.position.x + b.position.x) / 2;
            const midY = (a.position.y + b.position.y) / 2;
            const newLevel = a.fruitLevel + 1;
            addScore((newLevel) * 10);
            if (newLevel <= 10) {
              window.setTimeout(() => spawnFruit(midX, midY, newLevel), 0);
            }
          }
        });
      }

      function addScore(points) {
        state.score += points;
      }

      function triggerGameOver() {
        if (state.gameOver) return;
        state.gameOver = true;
        state.phase = "gameover";
        if (runner) Runner.stop(runner);
        runnerActive = false;
        const finalScore = state.score;
        refs.finalScore.textContent = String(finalScore);
        context.finishGame({
          score: finalScore,
          title: "奶龙堆满啦",
          summary: "顶部警戒线被顶穿了，奶龙合成链路终于停下。",
          tags: ["得分 " + finalScore, "等级 " + state.nextLevel, "已爆堆"]
        });
        refs.start.style.display = "none";
        refs.result.style.display = "flex";
        refs.preview.style.display = "none";
        refs.aim.style.display = "none";
        playResultAudioOnce();
      }

      function playResultAudioOnce() {
        if (!resultAudio || resultAudioPlayed) return;
        resultAudioPlayed = true;
        resultAudio.currentTime = 0;
        const playResult = resultAudio.play();
        if (playResult && typeof playResult.catch === "function") {
          playResult.catch(() => {
            resultAudioPlayed = false;
          });
        }
      }

      function resetResultAudio() {
        resultAudioPlayed = false;
        stopResultAudio();
      }

      function stopResultAudio() {
        if (!resultAudio) return;
        resultAudio.pause();
        resultAudio.currentTime = 0;
      }

      return { mount, start, pause, resume, reset, destroy, getState };
    }

    function createSeventhGame(container, context) {
      const GAME_DURATION = 300;
      const ROWS = 8;
      const COLS = 6;
      const LOGICAL_ROWS = ROWS + 2;
      const LOGICAL_COLS = COLS + 2;
      const ICONS = ["★", "❤", "⚡", "◆", "👻", "🚀", "☾", "☀", "🔥", "🍃", "☁", "❄"];
      let board = [];
      let selectedTile = null;
      let score = 0;
      let timeLeft = 0;
      let timerInterval = null;
      let pairsLeft = 0;
      let shuffleChances = 3;
      let isAnimating = false;
      let state = null;
      let refs = null;

      function getInitialState() {
        return { phase: "home", finished: false };
      }

      function mount() {
        container.className = "game-shell-inner seventh-root";
        container.innerHTML = `
          <div class="seventh-stage">
            <div class="seventh-home" data-home>
              <div class="game-panel seventh-panel" style="max-width:340px;padding:18px;text-align:center;">
                <div style="width:96px;height:96px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;background:#fde047;border:4px solid #111827;box-shadow:4px 4px 0 #111827;font-size:44px;">😺</div>
                <h2 class="game-heading" style="margin:0;color:#111827;">多巴胺连连看</h2>
                <p class="game-copy" style="margin-top:8px;color:#374151;">5 分钟激情寻路挑战！</p>
                <div class="modal-actions" style="margin-top:16px;">

            </div>
            <div class="game-screen hidden" data-game style="display:none;flex-direction:column;height:100%;">
              <div class="seventh-hud" style="padding:12px 12px 0;">

                  <div style="font-size:10px;font-weight:900;text-transform:uppercase;color:#64748b;">TIME</div>
                  <div data-timer style="font-size:24px;font-weight:900;line-height:1;">05:00</div>
                </div>
                <div class="game-panel seventh-panel" style="padding:10px 12px;flex:0 0 auto;text-align:right;">
                  <div style="font-size:10px;font-weight:900;text-transform:uppercase;color:#64748b;">SCORE</div>
                  <div data-score style="font-size:24px;font-weight:900;line-height:1;color:#f43f5e;">0</div>
                </div>
              </div>
              <div style="padding:10px 12px 0;">
                <div class="game-panel seventh-panel" style="height:14px;overflow:hidden;border-radius:999px;">
                  <div data-time-bar style="width:100%;height:100%;background:#34d399;"></div>

                </div>
              </div>
              <div style="padding:0 12px 12px;display:flex;gap:10px;">
                <button class="game-button" data-shuffle style="flex:1;background:#22d3ee;color:#111827;">重排 (<span data-shuffle-count>3</span>)</button>
                <button class="game-button" data-quit style="width:72px;background:#facc15;color:#111827;">退</button>
              </div>
            </div>
            <div class="seventh-result" data-result style="display:none;">
              <div class="game-panel seventh-panel" style="max-width:340px;padding:18px;text-align:center;">
                <div data-result-icon style="width:96px;height:96px;margin:0 auto 12px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#34d399;border:4px solid #111827;box-shadow:4px 4px 0 #111827;font-size:42px;">🏆</div>
                <h2 data-result-title class="game-heading" style="margin:0;color:#111827;">多巴胺王者！</h2>
                <p data-result-message class="game-copy" style="margin-top:8px;color:#374151;"></p>
                <div class="game-panel" style="margin-top:14px;padding:12px;display:flex;justify-content:space-around;background:#fef9c3;">
                  <div><div style="font-size:10px;font-weight:900;text-transform:uppercase;color:#64748b;">SCORE</div><div data-final-score style="font-size:28px;font-weight:900;color:#ec4899;">0</div></div>
                  <div><div style="font-size:10px;font-weight:900;text-transform:uppercase;color:#64748b;">TIME</div><div data-final-time style="font-size:28px;font-weight:900;color:#3b82f6;">0s</div></div>
                </div>
                <div class="modal-actions" style="margin-top:16px;display:flex;gap:10px;">
                  <button class="game-button" data-back style="flex:1;background:#e5e7eb;color:#111827;">返回</button>
                  <button class="game-button" data-restart style="flex:1;background:#34d399;color:#111827;">再来</button>
                </div>
              </div>
            </div>
          </div>
        `;
        refs = {
          home: container.querySelector("[data-home]"),
          game: container.querySelector("[data-game]"),
          result: container.querySelector("[data-result]"),
          timer: container.querySelector("[data-timer]"),
          score: container.querySelector("[data-score]"),
          timeBar: container.querySelector("[data-time-bar]"),
          board: container.querySelector("[data-board]"),
          lines: container.querySelector("[data-lines]"),
          shuffleCount: container.querySelector("[data-shuffle-count]"),
          shuffle: container.querySelector("[data-shuffle]"),
          quit: container.querySelector("[data-quit]"),
          startBtn: container.querySelector("[data-start-btn]"),
          resultIcon: container.querySelector("[data-result-icon]"),
          resultTitle: container.querySelector("[data-result-title]"),
          resultMessage: container.querySelector("[data-result-message]"),
          finalScore: container.querySelector("[data-final-score]"),
          finalTime: container.querySelector("[data-final-time]"),
          back: container.querySelector("[data-back]"),
          restart: container.querySelector("[data-restart]")
        };
        refs.startBtn.addEventListener("click", startGame);
        refs.shuffle.addEventListener("click", shuffleBoard);
        refs.quit.addEventListener("click", quitGame);
        refs.back.addEventListener("click", backToHome);
        refs.restart.addEventListener("click", startGame);
        state = getInitialState();
        renderHome();
      }

      function start() {
        context.setSummary({ status: "not-started", finished: false, title: "", summary: "", tags: [], score: 0 });
        renderHome();
      }

      function pause() {
        if (state.phase === "playing") {
          clearInterval(timerInterval);
          context.setStatus("paused");
        }
      }

      function resume() {
        if (state.phase === "playing") {
          clearInterval(timerInterval);
          timerInterval = setInterval(timerTick, 1000);
          context.setStatus("playing");
        }
      }

      function reset() {
        clearInterval(timerInterval);
        state = getInitialState();
        renderHome();
        context.setSummary({ status: "not-started", finished: false, title: "", summary: "", tags: [], score: 0 });
      }

      function destroy() {
        clearInterval(timerInterval);
      }

      function getState() {
        return state;
      }

      function renderHome() {
        state.phase = "home";
        refs.home.style.display = "flex";
        refs.game.style.display = "none";
        refs.result.style.display = "none";
      }

      function startGame() {
        clearInterval(timerInterval);
        state = getInitialState();
        state.phase = "playing";
        board = [];
        selectedTile = null;
        score = 0;
        timeLeft = GAME_DURATION;
        pairsLeft = (ROWS * COLS) / 2;
        shuffleChances = 3;
        isAnimating = false;
        refs.home.style.display = "none";
        refs.result.style.display = "none";
        refs.game.style.display = "flex";
        refs.shuffleCount.textContent = String(shuffleChances);
        updateScoreUI();
        updateTimerUI();
        initBoard();
        renderBoard();
        context.setSummary({ status: "playing", finished: false, title: "", summary: "", tags: [], score: 0 });
        context.setStatus("playing");
        timerInterval = setInterval(timerTick, 1000);
      }

      function timerTick() {
        timeLeft -= 1;
        updateTimerUI();
        if (timeLeft <= 0) endGame(false);
      }

      function endGame(win) {
        clearInterval(timerInterval);
        state.phase = "result";
        state.finished = true;
        setTimeout(() => {
          refs.game.style.display = "none";
          refs.result.style.display = "flex";
          const spent = GAME_DURATION - timeLeft;
          refs.finalScore.textContent = String(score);
          refs.finalTime.textContent = spent + "s";
          if (win) {
            refs.resultIcon.style.background = "#34d399";
            refs.resultIcon.textContent = "👑";
            refs.resultTitle.textContent = "多巴胺王者！";
            refs.resultMessage.textContent = "惊人的眼力与手速！";
          } else {
            refs.resultIcon.style.background = "#f43f5e";
            refs.resultIcon.textContent = "💣";
            refs.resultTitle.textContent = "时间耗尽";
            refs.resultMessage.textContent = "下次再快一点点就赢啦！";
          }
          context.finishGame({
            score,
            title: win ? "多巴胺王者！" : "时间耗尽",
            summary: win ? "你把整张棋盘都配对干净了。" : "时间结束前还差一点点。",
            tags: ["配对 " + (24 - pairsLeft * 2), "重排 " + (3 - shuffleChances), win ? "通关" : "未通关"]
          });
        }, 200);
      }

      function quitGame() {
        clearInterval(timerInterval);
        renderHome();
        context.setSummary({ status: "not-started", finished: false, title: "", summary: "", tags: [], score: 0 });
      }

      function backToHome() {
        renderHome();
        context.setSummary({ status: "not-started", finished: false, title: "", summary: "", tags: [], score: 0 });
      }

      function updateTimerUI() {
        const m = Math.floor(timeLeft / 60).toString().padStart(2, "0");
        const s = (timeLeft % 60).toString().padStart(2, "0");
        refs.timer.textContent = m + ":" + s;
        refs.timeBar.style.width = (timeLeft / GAME_DURATION) * 100 + "%";
        if (timeLeft < 30) {
          refs.timeBar.style.background = "#f43f5e";
          refs.timer.style.color = "#f43f5e";
        } else {
          refs.timeBar.style.background = "#34d399";
          refs.timer.style.color = "#111827";
        }
      }

      function updateScoreUI() {
        refs.score.textContent = String(score);
      }

      function initBoard() {
        board = Array.from({ length: LOGICAL_ROWS }, () => Array(LOGICAL_COLS).fill(0));
        const tileTypes = [];
        for (let i = 0; i < (ROWS * COLS) / 2; i++) {
          const typeId = (i % ICONS.length) + 1;
          tileTypes.push(typeId, typeId);
        }
        tileTypes.sort(() => Math.random() - 0.5);
        let index = 0;
        for (let r = 1; r <= ROWS; r++) {
          for (let c = 1; c <= COLS; c++) {
            board[r][c] = tileTypes[index++];
          }
        }
      }

      function renderBoard() {
        refs.board.innerHTML = "";
        for (let r = 0; r < LOGICAL_ROWS; r++) {
          for (let c = 0; c < LOGICAL_COLS; c++) {
            const val = board[r][c];
            const btn = document.createElement("button");
            btn.dataset.r = String(r);
            btn.dataset.c = String(c);
            btn.id = `tile-${r}-${c}`;
            if (r > 0 && r <= ROWS && c > 0 && c <= COLS) {
              btn.className = "seventh-tile";
              if (val > 0) {
                btn.textContent = ICONS[val - 1];
                btn.addEventListener("click", () => handleTileClick(r, c));
              } else {
                btn.classList.add("matched");
              }
            } else {
              btn.className = "seventh-tile hidden-path";
            }
            refs.board.appendChild(btn);
          }
        }
      }

      function getTileDOM(r, c) {
        return document.getElementById(`tile-${r}-${c}`);
      }

      function shuffleBoard() {
        if (shuffleChances <= 0 || isAnimating || state.phase !== "playing") return;
        shuffleChances -= 1;
        refs.shuffleCount.textContent = String(shuffleChances);
        const remaining = [];
        for (let r = 1; r <= ROWS; r++) {
          for (let c = 1; c <= COLS; c++) {
            if (board[r][c] !== 0) remaining.push(board[r][c]);
          }
        }
        remaining.sort(() => Math.random() - 0.5);
        let index = 0;
        for (let r = 1; r <= ROWS; r++) {
          for (let c = 1; c <= COLS; c++) {
            if (board[r][c] !== 0) board[r][c] = remaining[index++];
          }
        }
        selectedTile = null;
        renderBoard();
      }

      async function handleTileClick(r, c) {
        if (board[r][c] === 0 || isAnimating || state.phase !== "playing") return;
        const clickedDom = getTileDOM(r, c);
        if (!selectedTile) {
          selectedTile = { r, c };
          clickedDom.classList.add("selected");
          return;
        }
        if (selectedTile.r === r && selectedTile.c === c) {
          clickedDom.classList.remove("selected");
          selectedTile = null;
          return;
        }
        const val1 = board[selectedTile.r][selectedTile.c];
        const val2 = board[r][c];
        const firstDom = getTileDOM(selectedTile.r, selectedTile.c);
        if (val1 === val2) {
          const path = findPath(selectedTile, { r, c });
          if (path) {
            isAnimating = true;
            await drawSVGLine(path);
            firstDom.classList.remove("selected");
            firstDom.classList.add("matched");
            clickedDom.classList.add("matched");
            board[selectedTile.r][selectedTile.c] = 0;
            board[r][c] = 0;
            score += 50;
            updateScoreUI();
            pairsLeft -= 1;
            selectedTile = null;
            isAnimating = false;
            if (pairsLeft === 0) endGame(true);
          } else {
            changeSelection(firstDom, clickedDom, { r, c });
          }
        } else {
          changeSelection(firstDom, clickedDom, { r, c });
        }
      }

      function changeSelection(oldDom, newDom, newPos) {
        oldDom.classList.remove("selected");
        selectedTile = newPos;
        newDom.classList.add("selected");
      }

      function drawSVGLine(pathCoords) {
        return new Promise((resolve) => {
          refs.lines.innerHTML = "";
          const points = pathCoords.map((p) => {
            const el = getTileDOM(p.r, p.c);
            const x = el.offsetLeft + el.offsetWidth / 2;
            const y = el.offsetTop + el.offsetHeight / 2;
            return `${x},${y}`;
          }).join(" ");
          const shadowLine = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
          shadowLine.setAttribute("points", points);
          shadowLine.setAttribute("fill", "none");
          shadowLine.setAttribute("stroke", "#111827");
          shadowLine.setAttribute("stroke-width", "14");
          shadowLine.setAttribute("stroke-linecap", "square");
          shadowLine.setAttribute("stroke-linejoin", "miter");
          shadowLine.setAttribute("transform", "translate(3,3)");
          const mainLine = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
          mainLine.setAttribute("points", points);
          mainLine.setAttribute("fill", "none");
          mainLine.setAttribute("stroke", "#22d3ee");
          mainLine.setAttribute("stroke-width", "10");
          mainLine.setAttribute("stroke-linecap", "square");
          mainLine.setAttribute("stroke-linejoin", "miter");
          refs.lines.appendChild(shadowLine);
          refs.lines.appendChild(mainLine);
          setTimeout(() => {
            refs.lines.innerHTML = "";
            resolve();
          }, 280);
        });
      }

      function findPath(p1, p2) {
        return matchDirectPath(p1, p2) || matchOneCornerPath(p1, p2) || matchTwoCornerPath(p1, p2);
      }

      function isClear(r, c) {
        return board[r][c] === 0;
      }

      function matchDirectPath(p1, p2) {
        if (p1.r !== p2.r && p1.c !== p2.c) return null;
        if (p1.r === p2.r) {
          const minC = Math.min(p1.c, p2.c);
          const maxC = Math.max(p1.c, p2.c);
          for (let c = minC + 1; c < maxC; c++) if (!isClear(p1.r, c)) return null;
          return [p1, p2];
        }
        const minR = Math.min(p1.r, p2.r);
        const maxR = Math.max(p1.r, p2.r);
        for (let r = minR + 1; r < maxR; r++) if (!isClear(r, p1.c)) return null;
        return [p1, p2];
      }

      function matchOneCornerPath(p1, p2) {
        const corner1 = { r: p1.r, c: p2.c };
        const corner2 = { r: p2.r, c: p1.c };
        if (isClear(corner1.r, corner1.c) && matchDirectPath(p1, corner1) && matchDirectPath(corner1, p2)) return [p1, corner1, p2];
        if (isClear(corner2.r, corner2.c) && matchDirectPath(p1, corner2) && matchDirectPath(corner2, p2)) return [p1, corner2, p2];
        return null;
      }

      function matchTwoCornerPath(p1, p2) {
        for (let r = p1.r - 1; r >= 0; r--) {
          if (!isClear(r, p1.c)) break;
          const cPath = matchOneCornerPath({ r, c: p1.c }, p2);
          if (cPath) return [p1, ...cPath];
        }
        for (let r = p1.r + 1; r < LOGICAL_ROWS; r++) {
          if (!isClear(r, p1.c)) break;
          const cPath = matchOneCornerPath({ r, c: p1.c }, p2);
          if (cPath) return [p1, ...cPath];
        }
        for (let c = p1.c - 1; c >= 0; c--) {
          if (!isClear(p1.r, c)) break;
          const cPath = matchOneCornerPath({ r: p1.r, c }, p2);
          if (cPath) return [p1, ...cPath];
        }
        for (let c = p1.c + 1; c < LOGICAL_COLS; c++) {
          if (!isClear(p1.r, c)) break;
          const cPath = matchOneCornerPath({ r: p1.r, c }, p2);
          if (cPath) return [p1, ...cPath];
        }
        return null;
      }

      return { mount, start, pause, resume, reset, destroy, getState };
    }

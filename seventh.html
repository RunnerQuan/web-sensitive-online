<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>猫meme消消乐</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Nunito', 'sans-serif', 'system-ui'],
                    },
                    colors: {
                        nYellow: '#FFD93D',
                        nPink: '#FF6B6B',
                        nBlue: '#4D96FF',
                        nGreen: '#6BCB77',
                        nPurple: '#9D4EDD',
                        nOrange: '#FF9F29',
                        bgLight: '#FFF8E1'
                    },
                    boxShadow: {
                        'neo': '4px 4px 0px 0px rgba(0,0,0,1)',
                        'neo-lg': '8px 8px 0px 0px rgba(0,0,0,1)',
                        'neo-active': '0px 0px 0px 0px rgba(0,0,0,1)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #E5E7EB; 
            -webkit-tap-highlight-color: transparent;
        }

        /* Text Stroke Effect for Neo-brutalism */
        .text-stroke {
            -webkit-text-stroke: 2px black;
            color: white;
            text-shadow: 4px 4px 0 #000;
        }

        /* Button interactions */
        .btn-neo {
            transition: all 0.15s ease-in-out;
        }
        .btn-neo:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px 0px rgba(0,0,0,1);
        }

        /* Grid Tile Animations */
        .tile {
            transition: transform 0.2s ease-in-out, opacity 0.2s ease-in-out;
        }
        .tile.selected {
            transform: scale(1.1) rotate(-5deg);
            z-index: 10;
            box-shadow: 0 0 0 4px #FF6B6B, 4px 4px 0px 0px rgba(0,0,0,1);
        }
        .tile.popping {
            transform: scale(0);
            opacity: 0;
        }
        .tile.falling {
            animation: fallIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #game-board {
            touch-action: none; /* 防止在移动端滑动消除时页面跟着滚动 */
        }

        @keyframes fallIn {
            0% { transform: translateY(-50px) scale(0.8); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        /* Screen transitions */
        .screen {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }
        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="flex justify-center items-center h-screen w-full">

    <!-- Mobile Frame Container -->
    <div id="app-container" class="w-full max-w-md h-full sm:h-[850px] sm:max-h-screen bg-bgLight relative border-x-0 sm:border-x-4 sm:border-y-4 border-black sm:rounded-[40px] overflow-hidden flex flex-col shadow-neo-lg">
        
        <!-- ==================== HOME SCREEN ==================== -->
        <div id="screen-home" class="screen active flex-col justify-center items-center h-full w-full bg-nYellow relative p-6">
            <!-- Decorative Elements -->
            <div class="absolute top-10 left-4 text-4xl text-nPink transform -rotate-12"><i class="fa-solid fa-star"></i></div>
            <div class="absolute bottom-32 right-8 text-5xl text-nBlue transform rotate-12"><i class="fa-solid fa-heart"></i></div>
            
                <div class="relative w-48 h-48 mb-8 border-4 border-black rounded-full shadow-neo overflow-hidden bg-nGreen flex justify-center items-center z-10">
                <img src="./assets/images/cat-meme/homepage.jpg" alt="cat-meme-logo" class="w-full h-full object-cover bg-white">
                </div>

            <h1 class="text-6xl font-black text-center mb-6 text-stroke leading-tight z-10">
                猫meme<br>消消乐
            </h1>

            <!-- Game Rules Note -->
            <div class="bg-white border-4 border-black rounded-2xl shadow-neo p-4 mb-8 z-10 w-full max-w-[85%] text-center transform -rotate-2">
                <p class="font-black text-black text-lg mb-2">🕹️ 极限生存规则</p>
                <div class="space-y-1">
                    <p class="font-bold text-nGreen text-md bg-nGreen/20 rounded-lg py-1 px-2">✅ 正确消除：<span class="text-black">不扣步数</span></p>
                    <p class="font-bold text-nPink text-md bg-nPink/20 rounded-lg py-1 px-2">❌ 错误消除：<span class="text-black">扣除 1 步</span></p>
                </div>
            </div>

            <button onclick="startGame()" class="btn-neo w-full bg-nPink border-4 border-black text-white font-black text-2xl py-4 rounded-full shadow-neo z-10 flex items-center justify-center gap-3">
                <i class="fa-solid fa-play"></i> 开始游戏
            </button>
        </div>

        <!-- ==================== GAME SCREEN ==================== -->
        <div id="screen-game" class="screen flex-col h-full w-full bg-bgLight relative">
            
            <!-- Header (Status Bar) -->
            <div class="p-6 pb-2 flex justify-between items-center bg-white border-b-4 border-black rounded-b-3xl shadow-neo relative z-20">
                <!-- Score -->
                <div class="flex flex-col items-center">
                    <span class="text-sm font-black text-gray-500 uppercase tracking-wider">分数</span>
                    <span id="score-display" class="text-3xl font-black text-nBlue">0</span>
                </div>
                <!-- Target / Moves -->
                <div class="bg-nYellow border-4 border-black shadow-neo rounded-2xl px-6 py-2 flex flex-col items-center transform -translate-y-2 transition-all duration-300" id="moves-container">
                    <span class="text-sm font-black text-black">剩余步数</span>
                    <span id="moves-display" class="text-4xl font-black text-nPink text-stroke" style="-webkit-text-stroke: 1px black; text-shadow: 2px 2px 0 #000;">20</span>
                </div>
                <!-- Quit / Home -->
                <button onclick="goHome()" class="btn-neo w-12 h-12 bg-nPurple text-white border-4 border-black rounded-full shadow-neo flex justify-center items-center text-xl">
                    <i class="fa-solid fa-house"></i>
                </button>
            </div>

            <!-- Game Board Area -->
            <div class="flex-1 flex justify-center items-center p-4">
                <div id="game-board" class="w-full aspect-square bg-white border-4 border-black rounded-3xl shadow-neo-lg p-2 grid gap-1 relative">
                    <!-- JS will inject tiles here -->
                </div>
            </div>
            
            <!-- Bottom spacing to replace removed footer tools -->
            <div class="h-12 w-full"></div>
        </div>

        <!-- ==================== RESULT SCREEN ==================== -->
        <div id="screen-result" class="screen flex-col justify-center items-center h-full w-full bg-nPurple relative p-6">
            <!-- Decorative Confetti -->
            <div class="absolute top-20 left-10 w-4 h-12 bg-nYellow border-2 border-black transform rotate-45"></div>
            <div class="absolute top-40 right-10 w-6 h-6 bg-nPink border-2 border-black rounded-full"></div>
            <div class="absolute bottom-40 left-12 w-8 h-8 bg-nGreen border-2 border-black transform rotate-12"></div>

            <div class="bg-white border-4 border-black rounded-[40px] shadow-neo-lg w-full p-8 flex flex-col items-center z-10">
                <h2 class="text-4xl font-black text-nPink mb-2 text-stroke text-center leading-tight" style="-webkit-text-stroke: 1.5px black; text-shadow: 3px 3px 0 #000;">没步数啦!</h2>
                <p class="text-black font-bold mb-6">本次吸猫成就达成</p>
                
                <div class="w-full bg-bgLight border-4 border-black rounded-3xl p-6 mb-8 flex flex-col items-center shadow-inner">
                    <span class="text-gray-500 font-black mb-1">最终得分</span>
                    <span id="final-score" class="text-6xl font-black text-nBlue mb-4">0</span>
                    
                    <div class="flex gap-2 text-nYellow text-2xl">
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i>
                    </div>
                </div>

                <button onclick="startGame()" class="btn-neo w-full bg-nGreen border-4 border-black text-white font-black text-2xl py-4 rounded-full shadow-neo flex items-center justify-center gap-2 mb-4">
                    <i class="fa-solid fa-rotate-right"></i> 再来一次
                </button>
                <button onclick="goHome()" class="btn-neo w-full bg-nYellow border-4 border-black text-black font-black text-xl py-3 rounded-full shadow-neo flex items-center justify-center gap-2">
                    <i class="fa-solid fa-house"></i> 返回首页
                </button>
            </div>
        </div>

    </div>

    <!-- Game Logic Scripts -->
    <script>
        // Constants & Config
        const GRID_SIZE = 6;
        const INITIAL_MOVES = 20;
        
        // 6 Different Cat Memes from local assets
        const CAT_TYPES = [
            './assets/images/cat-meme/1.jpg',
            './assets/images/cat-meme/2.jpg',
            './assets/images/cat-meme/3.jpg',
            './assets/images/cat-meme/4.jpg',
            './assets/images/cat-meme/5.jpg',
            './assets/images/cat-meme/6.jpg'
        ];

        // State Variables
        let board = [];
        let score = 0;
        let moves = INITIAL_MOVES;
        let selectedTile = null; 
        let isAnimating = false;
        const successAudio = new Audio('./assets/happy.m4a');
        const errorAudio = new Audio('./assets/unhappy.m4a');
        successAudio.preload = 'auto';
        errorAudio.preload = 'auto';
        successAudio.playsInline = true;
        errorAudio.playsInline = true;

        function playEffect(audio) {
            audio.currentTime = 0;
            const promise = audio.play();
            if (promise && typeof promise.catch === 'function') {
                promise.catch(() => {});
            }
        }

        // DOM Elements
        const boardEl = document.getElementById('game-board');
        const scoreEl = document.getElementById('score-display');
        const movesEl = document.getElementById('moves-display');
        const finalScoreEl = document.getElementById('final-score');
        const movesContainer = document.getElementById('moves-container');
        const swipeRoot = document.getElementById('app-container');
        
        // Navigation Functions
        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function goHome() {
            switchScreen('screen-home');
        }

        function startGame() {
            switchScreen('screen-game');
            score = 0;
            moves = INITIAL_MOVES;
            updateStatus();
            initBoard();
            // 通知父页面游戏已重新开始
            window.parent.postMessage({
                type: 'game-restart',
                gameId: 'seventh'
            }, '*');
        }

        function gameOver() {
            finalScoreEl.innerText = score;
            switchScreen('screen-result');
            // 将游戏结果回传给父页面，供全局结算使用
            const movesUsed = INITIAL_MOVES - moves;
            let title, summary;
            if (score >= 300) {
                title = '多巴胺王者！';
                summary = '你把整张棋盘都配对干净了，惊人的眼力与手速！';
            } else if (score >= 150) {
                title = '猫meme鉴赏家';
                summary = '你的三连消除水平已经超出常人认知。';
            } else if (score >= 80) {
                title = '稳中带猫';
                summary = '虽然没有华丽操作，但每一步都有猫的道理。';
            } else {
                title = '被猫挠了';
                summary = '这些猫meme可能不太配合你，下次再来。';
            }
            const tags = ['得分 ' + score, '步数 ' + movesUsed + '/' + INITIAL_MOVES, score >= 150 ? '高玩' : '入门'];
            window.parent.postMessage({
                type: 'game-result',
                gameId: 'seventh',
                score: score,
                title: title,
                summary: summary,
                tags: tags
            }, '*');
        }

        let exitTouchStartX = 0;
        let exitTouchStartY = 0;
        let exitTouchArmed = false;
        let exitTouchBlocked = false;
        const EXIT_SWIPE_THRESHOLD = 36;

        function notifyParentHome() {
            window.parent.postMessage({ type: 'game-nav', target: 'sixth' }, '*');
        }

        function shouldBlockExitGesture(target) {
            return !!target && !!target.closest && target.closest('#game-board, button, .neo-btn');
        }

        function handleExitTouchStart(event) {
            if (!event.touches || event.touches.length !== 1) return;
            exitTouchArmed = true;
            exitTouchBlocked = shouldBlockExitGesture(event.target);
            exitTouchStartX = event.touches[0].clientX;
            exitTouchStartY = event.touches[0].clientY;
        }

        function handleExitTouchMove(event) {
            if (!exitTouchArmed || exitTouchBlocked || !event.touches || event.touches.length !== 1) return;
            const dx = event.touches[0].clientX - exitTouchStartX;
            const dy = event.touches[0].clientY - exitTouchStartY;
            if (dy > EXIT_SWIPE_THRESHOLD && Math.abs(dy) > Math.abs(dx)) {
                event.preventDefault();
            }
        }

        function handleExitTouchEnd(event) {
            if (!exitTouchArmed || exitTouchBlocked || !event.changedTouches || !event.changedTouches.length) {
                exitTouchArmed = false;
                exitTouchBlocked = false;
                return;
            }
            const dx = event.changedTouches[0].clientX - exitTouchStartX;
            const dy = event.changedTouches[0].clientY - exitTouchStartY;
            if (dy > EXIT_SWIPE_THRESHOLD && Math.abs(dy) > Math.abs(dx)) {
                notifyParentHome();
            }
            exitTouchArmed = false;
            exitTouchBlocked = false;
        }

        function handleExitWheel(event) {
            if (event.deltaY > 18 && !shouldBlockExitGesture(event.target)) {
                event.preventDefault();
                notifyParentHome();
            }
        }

        swipeRoot.addEventListener('touchstart', handleExitTouchStart, { passive: true });
        swipeRoot.addEventListener('touchmove', handleExitTouchMove, { passive: false });
        swipeRoot.addEventListener('touchend', handleExitTouchEnd, { passive: true });
        swipeRoot.addEventListener('wheel', handleExitWheel, { passive: false });

        function updateStatus(isError = false) {
            scoreEl.innerText = score;
            movesEl.innerText = moves;

            // 如果发生错误扣步数，增加一个简单的震动提示动画
            if(isError) {
                movesContainer.classList.add('bg-nPink');
                movesContainer.classList.remove('bg-nYellow');
                movesContainer.style.transform = 'translate(-2px, -2px) rotate(-3deg)';
                setTimeout(() => {
                    movesContainer.classList.add('bg-nYellow');
                    movesContainer.classList.remove('bg-nPink');
                    movesContainer.style.transform = 'translateY(-0.5rem)';
                }, 300);
            }
        }

        // --- Game Engine Logic ---

        function initBoard() {
            boardEl.style.gridTemplateColumns = `repeat(${GRID_SIZE}, minmax(0, 1fr))`;
            boardEl.style.gridTemplateRows = `repeat(${GRID_SIZE}, minmax(0, 1fr))`;
            
            board = [];
            for (let r = 0; r < GRID_SIZE; r++) {
                board[r] = [];
                for (let c = 0; c < GRID_SIZE; c++) {
                    let randomType;
                    // Prevent initial matches
                    do {
                        randomType = Math.floor(Math.random() * CAT_TYPES.length);
                    } while (
                        (c >= 2 && board[r][c-1] === randomType && board[r][c-2] === randomType) ||
                        (r >= 2 && board[r-1][c] === randomType && board[r-2][c] === randomType)
                    );
                    board[r][c] = randomType;
                }
            }
            renderBoard();
        }

        // 修改：现在接受一个 fallingGrid 数组，用于精准渲染哪些方块正在发生掉落行为，而非全盘掉落。
        function renderBoard(fallingGrid = null) {
            boardEl.innerHTML = '';
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    const tileVal = board[r][c];
                    const tileDiv = document.createElement('div');
                    
                    let extraClass = '';
                    if (fallingGrid && fallingGrid[r][c]) {
                        extraClass = 'falling';
                    }
                    
                    // Neo-brutalist tile styling
                    tileDiv.className = `tile w-full h-full border-2 border-black rounded-xl overflow-hidden shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] cursor-pointer relative bg-white flex justify-center items-center ${extraClass}`;
                    
                    tileDiv.dataset.r = r;
                    tileDiv.dataset.c = c;
                    
                    if (tileVal !== null) {
                        const img = document.createElement('img');
                        img.src = CAT_TYPES[tileVal];
                        img.className = "w-full h-full object-cover pointer-events-none";
                        tileDiv.appendChild(img);
                    } else {
                        tileDiv.className = "w-full h-full"; 
                    }

                    if (selectedTile && selectedTile.r === r && selectedTile.c === c) {
                        tileDiv.classList.add('selected');
                    }

                    // Touch and mouse events for swiping
                    tileDiv.addEventListener('mousedown', (e) => handleInputStart(r, c, e));
                    tileDiv.addEventListener('touchstart', (e) => handleInputStart(r, c, e), {passive: false});
                    
                    boardEl.appendChild(tileDiv);
                }
            }
        }

        // Input handling (Swipes & Clicks)
        let startX, startY;
        let activeR, activeC;

        function handleInputStart(r, c, e) {
            if (isAnimating || board[r][c] === null) return;
            const touch = e.touches ? e.touches[0] : e;
            startX = touch.clientX;
            startY = touch.clientY;
            activeR = r;
            activeC = c;
        }

        document.addEventListener('mouseup', handleInputEnd);
        document.addEventListener('touchend', handleInputEnd);

        function handleInputEnd(e) {
            if (isAnimating || activeR === undefined) return;
            const touch = e.changedTouches ? e.changedTouches[0] : e;
            const dx = touch.clientX - startX;
            const dy = touch.clientY - startY;

            let targetR = activeR;
            let targetC = activeC;

            if (Math.abs(dx) > 20 || Math.abs(dy) > 20) {
                if (Math.abs(dx) > Math.abs(dy)) {
                    targetC = dx > 0 ? activeC + 1 : activeC - 1; 
                } else {
                    targetR = dy > 0 ? activeR + 1 : activeR - 1; 
                }

                if (targetR >= 0 && targetR < GRID_SIZE && targetC >= 0 && targetC < GRID_SIZE) {
                    swapTiles(activeR, activeC, targetR, targetC);
                }
                selectedTile = null; 
            } else {
                if (!selectedTile) {
                    selectedTile = { r: activeR, c: activeC };
                    renderBoard();
                } else {
                    const r1 = selectedTile.r;
                    const c1 = selectedTile.c;
                    const r2 = activeR;
                    const c2 = activeC;

                    const isAdjacent = (Math.abs(r1 - r2) === 1 && c1 === c2) || (Math.abs(c1 - c2) === 1 && r1 === r2);

                    if (isAdjacent) {
                        swapTiles(r1, c1, r2, c2); 
                    } else if (r1 === r2 && c1 === c2) {
                        selectedTile = null; 
                        renderBoard();
                    } else {
                        selectedTile = { r: r2, c: c2 }; 
                        renderBoard();
                    }
                }
            }
            
            activeR = undefined;
            activeC = undefined;
        }

        // 修改：增加了物理滑动动画（滑动交换过程更加真实可见）
        async function swapTiles(r1, c1, r2, c2) {
            isAnimating = true;
            
            // --- 添加视觉平移滑动动画阶段 ---
            const idx1 = r1 * GRID_SIZE + c1;
            const idx2 = r2 * GRID_SIZE + c2;
            const el1 = boardEl.children[idx1];
            const el2 = boardEl.children[idx2];
            
            if (el1 && el2) {
                const rect1 = el1.getBoundingClientRect();
                const rect2 = el2.getBoundingClientRect();
                const visualDx = rect2.left - rect1.left;
                const visualDy = rect2.top - rect1.top;
                
                el1.style.transition = 'transform 0.2s ease-in-out';
                el2.style.transition = 'transform 0.2s ease-in-out';
                el1.style.transform = `translate(${visualDx}px, ${visualDy}px)`;
                el2.style.transform = `translate(${-visualDx}px, ${-visualDy}px)`;
                el1.style.zIndex = '10';
                el2.style.zIndex = '10';
                
                await sleep(200); // 等待滑动手势做完
            }
            // --- 视觉动画结束 ---

            // 更新内部逻辑数据结构
            let temp = board[r1][c1];
            board[r1][c1] = board[r2][c2];
            board[r2][c2] = temp;
            
            selectedTile = null; 
            renderBoard(); 

            // 给一点点渲染缓冲时间
            await sleep(50);

            const matches = findMatches();
            
            if (matches.length > 0) {
                // 正确消除：触发消除和掉落（不扣除步数）
                updateStatus(false);
                playEffect(successAudio);
                await processMatches(matches);
            } else {
                // 错误消除：先在视觉上退回原位，再扣除步数
                const el1_new = boardEl.children[idx1];
                const el2_new = boardEl.children[idx2];
                
                if (el1_new && el2_new) {
                    const rect1 = el1_new.getBoundingClientRect();
                    const rect2 = el2_new.getBoundingClientRect();
                    const visualDx = rect2.left - rect1.left;
                    const visualDy = rect2.top - rect1.top;
                    
                    el1_new.style.transition = 'transform 0.2s ease-in-out';
                    el2_new.style.transition = 'transform 0.2s ease-in-out';
                    el1_new.style.transform = `translate(${visualDx}px, ${visualDy}px)`;
                    el2_new.style.transform = `translate(${-visualDx}px, ${-visualDy}px)`;
                    el1_new.style.zIndex = '10';
                    el2_new.style.zIndex = '10';
                    
                    await sleep(200);
                }

                // 还原逻辑数组
                temp = board[r1][c1];
                board[r1][c1] = board[r2][c2];
                board[r2][c2] = temp;
                
                // 扣除 1 步，触发震动反馈
                moves -= 1;
                if (moves < 0) moves = 0; 
                updateStatus(true);
                playEffect(errorAudio);
                
                renderBoard();
                isAnimating = false;

                if (moves <= 0) {
                    setTimeout(() => {
                        gameOver();
                    }, 500);
                }
            }
        }

        function findMatches() {
            let matchedCoords = new Set();

            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE - 2; c++) {
                    let v = board[r][c];
                    if (v !== null && v === board[r][c+1] && v === board[r][c+2]) {
                        matchedCoords.add(`${r},${c}`);
                        matchedCoords.add(`${r},${c+1}`);
                        matchedCoords.add(`${r},${c+2}`);
                    }
                }
            }

            for (let c = 0; c < GRID_SIZE; c++) {
                for (let r = 0; r < GRID_SIZE - 2; r++) {
                    let v = board[r][c];
                    if (v !== null && v === board[r+1][c] && v === board[r+2][c]) {
                        matchedCoords.add(`${r},${c}`);
                        matchedCoords.add(`${r+1},${c}`);
                        matchedCoords.add(`${r+2},${c}`);
                    }
                }
            }

            return Array.from(matchedCoords).map(str => {
                let parts = str.split(',');
                return { r: parseInt(parts[0]), c: parseInt(parts[1]) };
            });
        }

        async function processMatches(matches) {
            const matchCount = matches.length;
            score += matchCount * 10;
            if (matchCount > 3) {
                score += (matchCount - 3) * 20; 
            }
            updateStatus(false);

            // "砰"地一下爆破动画
            matches.forEach(m => {
                const index = m.r * GRID_SIZE + m.c;
                const tileEl = boardEl.children[index];
                if(tileEl) tileEl.classList.add('popping');
            });
            
            await sleep(300);

            matches.forEach(m => {
                board[m.r][m.c] = null;
            });

            // 掉落逻辑，并精准返回哪些格子进行了坠落，传递给渲染函数
            const fallingGrid = dropTiles();
            renderBoard(fallingGrid); 
            
            await sleep(350);

            // 连击 (Combo) 判定
            const newMatches = findMatches();
            if (newMatches.length > 0) {
                // 如果掉落后凑成3个，触发连击效果
                playEffect(successAudio);
                await processMatches(newMatches);
            } else {
                isAnimating = false;
                
                if (moves <= 0) {
                    setTimeout(() => {
                        gameOver();
                    }, 500);
                }
            }
        }

        // 修改：增加了 fallingGrid 的返回结果，只记录真正掉落或新生成的动物位置
        function dropTiles() {
            let fallingGrid = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(false));

            for (let c = 0; c < GRID_SIZE; c++) {
                let emptySpaces = 0;
                // 从下往上统计空缺并下移
                for (let r = GRID_SIZE - 1; r >= 0; r--) {
                    if (board[r][c] === null) {
                        emptySpaces++;
                    } else if (emptySpaces > 0) {
                        board[r + emptySpaces][c] = board[r][c];
                        board[r][c] = null;
                        // 标记原有的方块下移后所在的新位置
                        fallingGrid[r + emptySpaces][c] = true; 
                    }
                }
                
                // 顶部生成填补的新方块
                for(let r = 0; r < emptySpaces; r++) {
                    board[r][c] = Math.floor(Math.random() * CAT_TYPES.length);
                    fallingGrid[r][c] = true;
                }
            }
            return fallingGrid;
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

    </script>
